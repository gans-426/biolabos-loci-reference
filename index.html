/* ═══════════════════════════════════════════════════════════════════
   reference-sequence.css — Loci Reference / locus-detail accordion
   ═══════════════════════════════════════════════════════════════════

   Styles for the colored-base reference sequence grid shown inside
   the locus-detail modal. The accordion is injected by
   loci-reference.js::openLocusDetail() when a locus has a matching
   entry in public/loci-reference/data/reference-sequences.json.

   Layout:
     <details.lr-refseq>
       <summary.lr-refseq-summary>🧬 Reference sequence · FSSG v6.1</summary>
       <div.lr-refseq-body>
         <div.lr-refseq-toolbar>
           <button.lr-refseq-toggle-btn>Show ±100 bp flanking</button>
           <span.lr-refseq-coords>chr3:45540733-… · 75 bp repeat region</span>
         </div>
         <div.lr-refseq-bracket>ISFG: TATC[2]TGTC[n]TATC[n]</div>
         <div.lr-refseq-grid-container>
           <div.lr-refseq-grid>
             <div.lr-refseq-row>
               <span.lr-refseq-pos>   1</span>
               <span.lr-base.lr-base-T>T</span>
               <span.lr-base.lr-base-C>C</span>
               …
             </div>
             …
           </div>
         </div>
       </div>
     </details>

   Palette matches the user's Excel image and standard biochemistry
   coloring: A=green, T=pink/red, G=yellow, C=blue, other=gray.
*/

.lr-refseq {
  margin-top: 12px;
  border: .5px solid var(--brd);
  border-radius: 6px;
  background: var(--bg1);
}
.lr-refseq-summary {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  user-select: none;
  list-style: none;
}
.lr-refseq-summary::-webkit-details-marker { display: none; }
.lr-refseq-summary::before {
  content: '▸';
  display: inline-block;
  margin-right: 6px;
  color: var(--tx3);
  transition: transform .15s;
}
.lr-refseq[open] > .lr-refseq-summary::before { transform: rotate(90deg); }
.lr-refseq-summary:hover { background: var(--bg2); }
.lr-refseq-source {
  color: var(--tx3);
  font-weight: 400;
  font-size: 11px;
  margin-left: 4px;
}

.lr-refseq-body {
  padding: 10px 12px 12px;
  border-top: .5px solid var(--brd);
}

.lr-refseq-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  font-size: 11px;
}
.lr-refseq-toggle-btn {
  font-size: 10px !important;
  padding: 3px 10px !important;
}
.lr-refseq-coords {
  color: var(--tx3);
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 10px;
}

.lr-refseq-bracket {
  font-size: 10px;
  color: var(--tx2);
  margin-bottom: 4px;
}
.lr-refseq-bracket code {
  background: var(--bg0);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
}

.lr-refseq-grid-container {
  margin-top: 8px;
  padding: 8px;
  background: var(--bg0);
  border-radius: 4px;
  overflow-x: auto;
}

.lr-refseq-grid {
  font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
  font-size: 11px;
  line-height: 1.4;
}
.lr-refseq-row {
  display: flex;
  align-items: center;
  gap: 1px;
  white-space: nowrap;
  margin-bottom: 2px;
}
.lr-refseq-pos {
  display: inline-block;
  width: 40px;
  color: var(--tx3);
  font-size: 9px;
  text-align: right;
  margin-right: 8px;
  user-select: none;
  flex-shrink: 0;
}

/* Per-base colored cells — matches user's Excel palette */
.lr-base {
  display: inline-block;
  width: 15px;
  text-align: center;
  font-weight: 600;
  color: #1a1a1a;
  padding: 1px 0;
  border-radius: 2px;
  flex-shrink: 0;
}
.lr-base-A { background: #86efac; }   /* green  */
.lr-base-T { background: #fda4af; }   /* pink   */
.lr-base-G { background: #fde68a; }   /* yellow */
.lr-base-C { background: #93c5fd; }   /* blue   */
.lr-base-N,
.lr-base-R,
.lr-base-Y,
.lr-base-S,
.lr-base-W,
.lr-base-K,
.lr-base-M { background: #e5e7eb; color: #4b5563; }

/* Light-mode vs dark-mode base readability — theme via CSS vars.
   The color-lightness stays consistent because the bases are all
   pastel-light; darkening the text a touch in dark mode is enough. */
[data-theme="dark"] .lr-base { color: #0a0a0a; }

/* Flanking mode — dim the flanking bases slightly, add a divider
   on either side of the repeat region so the analyst can spot the
   primer-binding context. */
.lr-refseq[data-showing="full"] .lr-base-flank {
  opacity: .55;
}
.lr-refseq[data-showing="full"] .lr-base-repeat {
  /* subtle emphasis on the actual repeat */
  box-shadow: inset 0 -2px 0 rgba(0,0,0,.2);
}
.lr-refseq[data-showing="full"] .lr-base-boundary-start {
  border-left: 2px solid var(--acc);
  margin-left: 2px;
}
.lr-refseq[data-showing="full"] .lr-base-boundary-end {
  border-right: 2px solid var(--acc);
  margin-right: 2px;
}

/* ═══════════════════════════════════════════════════════════════════
   Motif boxing (Q2 — v71)
   ═══════════════════════════════════════════════════════════════════
   Draws visual boxes around each repeat unit, mirroring FSSG's own
   visualization. Three phases in a fallback chain:
     · Phase 3  STRNaming v1.2 ("TATC[2]TGTC[n]TATC[n]")
     · Phase 2  Historical bracket ("[TCTA]3 TCTG [TCTA]12")
     · Phase 1  Simple motif (sequence = motif+)
   Unparseable loci render plainly (no boxes) — never shows wrong boxes.
   ═══════════════════════════════════════════════════════════════════ */

.lr-refseq-structure-note {
  margin-bottom: 6px;
  font-size: 9px;
  color: var(--tx3);
  font-style: italic;

}
.lr-refseq-pos-spacer {

  margin-right: 8px;

.lr-refseq-motif-num {

    return origFetch ? origFetch(url) : Promise.reject(new Error('Not available in portable mode: ' + s));
  };
})();

// Theme toggle — wired to the topbar button.
function phToggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';

// closeKitReference() — Studios's version hides the modal; in the

<script>
// ═══════════════════════════════════════════════════════════════════
// The Loci Reference module — unchanged from Studios's live source.
// All rendering, parsing, filtering, hover tooltips, FSSG merge, motif
// boxing, kit-amplicon visual-position bar logic is inherited verbatim.
// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// loci-reference.js — BIOLABOS Studios Loci Reference module
// ═══════════════════════════════════════════════════════════════════
//
// 51-locus forensic STR library + kit membership. Indexed by LOCUS
// (not by kit — that's why the feature is called "Loci Reference"
// rather than the old "Kit Reference" name). Kit membership is
// secondary metadata shown as chips on each locus card and as a
// cross-kit coverage matrix in the Compare view.
//
// Data: /public/loci-reference/data/loci.json (one JSON, all loci + all kits).
// Lazy-loaded on first open of the modal.
//
// Public entry (called from public/index.html):
//   showKitReference(optionalLocusName)   (primary name — kept for
//                                          cache compatibility)
//   showLociReference(...)                alias (new canonical name)
//
// External dependencies (globals defined in index.html inline bootstrap):

// Loaded via a <script src> tag after the inline bootstrap so those

//
// Original header kept below for historical context:
// PORTED FROM BIOLABOS (public/index.html — same function set; Studios
// uses its own CSS variable names and modal-open pattern).
//
// Data: fetched from /loci-reference/data/loci.json on first open (file mirrors

// HTML-escape helper — used throughout the ported code.
function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// Dye-colour palette — matches BIOLABOS exactly so the Kit Reference
// looks identical across the two apps. Plain hex because these colours
// get baked into inline styles and SVG attributes.
const DYE_COLORS = { blue: '#3b82f6', green: '#22c55e', yellow: '#d4a017', red: '#ef4444', purple: '#a855f7', orange: '#f97316' };

// Runtime store — populated on first showKitReference() call.
let STR_DATA  = { loci: [], kits: {} };
let STR_KITS  = { None: { loci: {} } };
let LOCUS_MAP = {};

// View + filter state. Survives close/reopen of the modal in-session
// (but not across reloads — BIOLABOS has the same behaviour).
let _kitRefView   = 'cards';
let _kitRefFilter = { platform: 'all', type: 'all', dye: null, kit: null, codis: null, search: '' };
let _kitRefLoaded = false;

// One-shot loader for /loci-reference/data/loci.json. Builds:
//   STR_DATA  — the raw JSON
//   LOCUS_MAP — { locusName -> locus metadata }  for O(1) lookups
//   STR_KITS  — { kitName  -> { loci: locus->dye, fullName, channels, rawLoci } }
//               (a flattened shape used by kit-chips and the compare table)
function loadStrData() {
  return fetch('/loci-reference/data/loci.json').then(r => r.json()).then(data => {
    STR_DATA = data;
    LOCUS_MAP = {};
    (data.loci || []).forEach(l => { LOCUS_MAP[l.n] = l; });
    STR_KITS = { None: { loci: {} } };
    for (const [name, kit] of Object.entries(data.kits || {})) {
      const loci = {};
      for (const [locus, info] of Object.entries(kit.loci || {})) loci[locus] = info.dye;
      STR_KITS[name] = { loci, fullName: kit.fullName, channels: kit.channels, rawLoci: kit.loci };
    }
    _kitRefLoaded = true;
  }).catch(e => {
    console.error('loci.json load failed:', e);
    toast('Could not load STR locus library: ' + (e.message || e), 'error');
  });
}

// Helpers reused by card/table/compare renderers.
// Key-existence check (not truthiness) — NGS kits store undefined for
// `loci[locusName]` because they have no dye channel. A plain
// `if (kit.loci[locusName])` would drop those kits silently.
function getKitsForLocus(locusName) {
  const out = [];
  for (const [kitName, kit] of Object.entries(STR_KITS)) {
    if (kitName === 'None') continue;
    if (kit.loci && Object.prototype.hasOwnProperty.call(kit.loci, locusName)) {
      out.push({ kit: kitName, dye: kit.loci[locusName] });   // dye may be undefined for NGS
    }
  }
  return out;
}
function getLocusInfo(locusName) { return LOCUS_MAP[locusName] || null; }

// ── Reference sequences + flanking variants + change log ─────────
// Three sibling JSON files lazy-loaded on first showKitReference():
//   · reference-sequences.json — v3.0, nested FSSG hierarchy (Full
//     Range → ISFG Minimum Range → Historical Repeat), bracketing,
//     5-6 NGS kit amplicons per locus
//   · flanking-variants.json   — gnomAD v3.1.2 flanking SNPs per locus
//                                with MAF for 5 populations
//   · fssg-changelog.json      — per-locus FSSG version history
// Single parallel fetch set on first use; cached for the session.
// See tools/loci-reference/extract-fssg-full.js for how these are
// produced from vendor/fssg/FSSG_v6-1_beta.xlsx.
let _refSeqData    = null;
let _flankVarData  = null;
let _changelogData = null;
let _stutterModel  = null;   // v468 — per-allele expected-stutter reference (Thermo Fisher GlobalFiler dev-val)
let _refSeqLoaded  = false;
function loadReferenceSequences() {
  if (_refSeqLoaded) return Promise.resolve(_refSeqData);
  const safeJson = (path) => fetch(path)
    .then(r => r.ok ? r.json() : null)
    .catch(() => null);
  return Promise.all([
    safeJson('/loci-reference/data/reference-sequences.json'),
    safeJson('/loci-reference/data/flanking-variants.json'),
    safeJson('/loci-reference/data/fssg-changelog.json'),
    safeJson('/loci-reference/data/stutter-model.json')
  ]).then(([seq, vars, log, stutter]) => {
    _refSeqData    = seq  || { sequences: {} };
    _flankVarData  = vars || { variants: {}, summary: {}, populations: {} };
    _changelogData = log  || { entriesByLocus: {}, entries: [] };
    _stutterModel  = stutter || { loci: {}, meta: {} };
    _refSeqLoaded  = true;
    return _refSeqData;
  });
}

// Per-allele EXPECTED-stutter reference for one locus (v468). VALUES are Thermo
// Fisher's published GlobalFiler developmental-validation parameters (manufacturer
// baseline, not lab-validated); "DNAStatistX" is only the file format. Present for
// the ~22 GlobalFiler STR loci, absent otherwise. Decision-support only.
function getStutterModel(locusName) {
  return (_stutterModel && _stutterModel.loci && _stutterModel.loci[locusName]) || null;
}

// Collapsed <details> panel: per-allele back / forward / double-back expected
// stutter, headed with the model name, footered with the Thermo Fisher citation
// + the "decision-support, not a validated filter" caveat. '' when no model.
function renderPerAlleleStutterPanel(locusName) {
  const m = getStutterModel(locusName);
  if (!m || !m.back) return '';
  const meta = (_stutterModel && _stutterModel.meta) || {};
  const dirs = [['back', 'Back (N−4)'], ['forward', 'Forward (N+4)'], ['doubleBack', 'Double-back (N−8)']];
  const alleleSet = new Set();
  for (const [d] of dirs) if (m[d] && m[d].byAllele) Object.keys(m[d].byAllele).forEach(a => alleleSet.add(a));
  const alleles = [...alleleSet].sort((x, y) => (parseFloat(x) - parseFloat(y)) || (x < y ? -1 : 1));
  const pct = (v) => (v == null ? '—' : v.toFixed(2) + '%');
  const cell = (d, a) => pct(m[d] && m[d].byAllele && m[d].byAllele[a] ? m[d].byAllele[a].mean : null);
  const idSafe = cssEscapeId(locusName);

  let h = '<details class="lr-stutter-model" id="lr-stutter-' + idSafe + '">';
  h += '<summary class="lr-stutter-summary">📊 Per-allele stutter <span class="lr-stutter-source">· ' + escHtml(meta.name || 'GlobalFiler model') + '</span></summary>';
  h += '<div class="lr-stutter-body">';
  h += '<div class="lr-stutter-note">Expected stutter ratio per allele (as the parent) — length-dependent (LUS-aware), so complex loci vary allele-by-allele. <b>Decision support only</b>; the validated stutter filter is the lab\'s own per-locus characterization (the Stutter studio), not this reference.</div>';
  h += '<div class="lr-stutter-scroll"><table class="lr-stutter-table"><thead><tr><th>Allele</th>';
  for (const [, label] of dirs) h += '<th>' + label + '</th>';
  h += '</tr></thead><tbody>';
  h += '<tr class="lr-stutter-locusrow"><td>(Locus)</td>';
  for (const [d] of dirs) h += '<td>' + pct(m[d] && m[d].locusLevel ? m[d].locusLevel.mean : null) + '</td>';
  h += '</tr>';
  for (const a of alleles) {
    h += '<tr><td>' + escHtml(a) + '</td>';
    for (const [d] of dirs) h += '<td>' + cell(d, a) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  h += '<div class="lr-stutter-footer">Source: <b>Thermo Fisher — GlobalFiler developmental validation</b> · manufacturer-published parameters (not re-trained on lab data)' + (meta.format ? ' · supplied as a DNAStatistX-format model' : '') + '.</div>';
  h += '</div></details>';
  return h;
}

// Return the full per-locus sequence record (v3.0 nested schema) plus a
// transparent compatibility layer exposing the old v1.0 flat field names
// (`flankingLeft`, `repeatRegion`, `flankingRight`, `chr`, `grch38`,
// `strNaming`, `historicalBracketing`) for anything still reading the
// old shape. The shim derives those from the nested fields — no
// duplicated data, no drift.
function getRefSequence(locusName) {
  if (!_refSeqData || !_refSeqData.sequences) return null;
  const raw = _refSeqData.sequences[locusName];
  if (!raw) return null;
  if (raw.sequences && !raw._shimmed) {
    const s = raw.sequences;
    raw.flankingLeft        = (s.fullRangeLeftFlank  || '') + (s.minRangeLeftFlank  || '');
    raw.repeatRegion        = s.historicalRepeat || '';
    raw.flankingRight       = (s.minRangeRightFlank || '') + (s.fullRangeRightFlank || '');
    raw.chr                 = raw.chromosome || null;
    raw.grch38              = raw.coordinates && raw.coordinates.grch38 && raw.coordinates.grch38.isfgMinimumRange
      ? { repeatStart: raw.coordinates.grch38.isfgMinimumRange.start,
          repeatEnd:   raw.coordinates.grch38.isfgMinimumRange.end }
      : null;
    raw.strNaming           = raw.bracketing && raw.bracketing.strNaming_v1_2 || null;
    raw.historicalBracketing = raw.bracketing && raw.bracketing.historical || null;
    raw._shimmed = true;
  }
  return raw;
}

function getFlankingVariants(locusName) {
  if (!_flankVarData || !_flankVarData.variants) return [];
  return _flankVarData.variants[locusName] || [];
}
function getFlankingVariantSummary(locusName) {
  if (!_flankVarData || !_flankVarData.summary) return null;
  return _flankVarData.summary[locusName] || null;
}
function getFssgChangelog(locusName) {
  if (!_changelogData || !_changelogData.entriesByLocus) return [];
  return _changelogData.entriesByLocus[locusName] || [];
}

// Render the colored-base grid for a locus. `showFlanking=true`
// includes the ±flanking regions with visual dividers between
// left-flank / repeat / right-flank. Each row shows a 1-based
// position counter followed by `basesPerRow` bases.
//
// v71: motif boxing — if `opt.repeatStructure` is a resolved token
// array (from computeRepeatStructure), each repeat unit is wrapped
// in a bordered group mirroring FSSG's visualization. When no
// structure is available, falls back to plain unboxed bases.
//
// v72: per-base hover tooltips — each base <span> carries a `title`
// with its 1-indexed position, GRCh38 coordinate (when known), and
// motif-group membership (when resolved), so analysts can resolve
// any visible base to a canonical locus/genomic position without
// leaving the modal.
function renderRefSequenceGrid(refData, options) {
  const opt           = options || {};
  const showFlanking  = !!opt.showFlanking && (refData.flankingLeft || refData.flankingRight);
  const basesPerRow   = 30;
  let   bases, repeatStart, repeatEnd;
  if (showFlanking) {
    bases       = (refData.flankingLeft || '') + refData.repeatRegion + (refData.flankingRight || '');
    repeatStart = (refData.flankingLeft || '').length;
    repeatEnd   = repeatStart + refData.repeatRegion.length;
  } else {
    bases       = refData.repeatRegion;
    repeatStart = 0;
    repeatEnd   = bases.length;
  }

  // Compute the GRCh38 coordinate of base index 0 in the displayed
  // sequence. When flanking is shown, that's the full-range start;
  // otherwise it's the ISFG minimum range start. Either may be null
  // (e.g. for lab_master entries without FSSG coordinates).
  const g38 = refData && refData.coordinates && refData.coordinates.grch38;
  let coordBase = null, coordChr = null;
  if (g38) {
    if (showFlanking && g38.fullRange) {
      coordBase = g38.fullRange.start;
      coordChr  = g38.fullRange.chr;
    } else if (g38.isfgMinimumRange) {
      coordBase = g38.isfgMinimumRange.start;
      coordChr  = g38.isfgMinimumRange.chr;
    }
  }

  // ── Pre-compute per-index motif metadata from the parsed token
  // array. motifAt[i] = { motifLen, posInGroup, isFirst, isLast,
  // isInterruptor, motifNumber } for bases inside the located repeat
  // run; other indices stay null and render plainly.
  const motifAt = new Array(bases.length).fill(null);
  const rs = opt.repeatStructure;
  if (rs && rs.tokens) {
    // startOffset is the 0-based offset WITHIN the repeat region where
    // the first token begins (there may be a few bp of min-range flank
    // before the core historical repeat — those stay unboxed).
    let seqIdx  = repeatStart + (rs.startOffset || 0);
    let groupIdx = 0;
    for (const t of rs.tokens) {
      for (let u = 0; u < t.count; u++) {
        if (!t.interruptor) groupIdx++;
        for (let k = 0; k < t.motif.length; k++) {
          if (seqIdx + k < bases.length) {
            motifAt[seqIdx + k] = {
              motifLen:      t.motif.length,
              posInGroup:    k,
              isFirst:       k === 0,
              isLast:        k === t.motif.length - 1,
              isInterruptor: !!t.interruptor,
              motifNumber:   t.interruptor ? null : groupIdx
            };
          }
        }
        seqIdx += t.motif.length;
      }
    }
  }

  let html = '<div class="lr-refseq-grid">';
  for (let i = 0; i < bases.length; i += basesPerRow) {
    const rowBases = bases.slice(i, i + basesPerRow);

    // Optional motif-number strip above this row — shows "1 2 3 …" above
    // each motif group that starts in this row (mirroring FSSG's numbering)
    if (rs && rs.tokens) {
      let numStrip = '<span class="lr-refseq-pos lr-refseq-pos-spacer">&nbsp;</span>';
      let rendered = false;
      for (let j = 0; j < rowBases.length; j++) {
        const idx = i + j;
        const m = motifAt[idx];
        if (m && m.isFirst && !m.isInterruptor) {
          const motifSeq = bases.substr(idx, m.motifLen);
          const numTip = 'Motif ' + m.motifNumber + ' — repeat unit ' + motifSeq.toUpperCase();
          numStrip += '<span class="lr-refseq-motif-num" title="' + numTip + '" style="width:' + (m.motifLen * 15 + (m.motifLen - 1)) + 'px">' + m.motifNumber + '</span>';
          rendered = true;
        } else if (m && m.isFirst && m.isInterruptor) {
          const motifSeq = bases.substr(idx, m.motifLen);
          const intTip = 'Interruptor: ' + motifSeq + ' — non-repeat sequence breaking the main motif run. The repeat numbering resumes after this segment.';
          numStrip += '<span class="lr-refseq-motif-num lr-refseq-motif-num-interruptor" title="' + intTip + '" style="width:' + (m.motifLen * 15 + (m.motifLen - 1)) + 'px">·</span>';
          rendered = true;
        } else if (!m || !m.isFirst) {
          // Skip — the numbered span above accounts for the whole group's width
          if (!m) numStrip += '<span class="lr-refseq-motif-gap">&nbsp;</span>';
        }
      }
      if (rendered) html += '<div class="lr-refseq-motif-row">' + numStrip + '</div>';
    }

    html += '<div class="lr-refseq-row">';
    html += '<span class="lr-refseq-pos">' + String(i + 1).padStart(4, ' ') + '</span>';
    for (let j = 0; j < rowBases.length; j++) {
      const idx  = i + j;
      const base = rowBases[j];
      let   cls  = 'lr-base lr-base-' + base;
      if (showFlanking) {
        if      (idx <  repeatStart) cls += ' lr-base-flank';
        else if (idx >= repeatEnd)   cls += ' lr-base-flank';
        else                         cls += ' lr-base-repeat';
        if (idx === repeatStart) cls += ' lr-base-boundary-start';
        if (idx === repeatEnd)   cls += ' lr-base-boundary-end';
      }
      // Motif box markers — top/bottom border on every repeat base,
      // left border on motif-first, right border on motif-last.
      const m = motifAt[idx];
      if (m) {
        cls += ' lr-base-motif';
        if (m.isFirst) cls += ' lr-base-motif-first';
        if (m.isLast)  cls += ' lr-base-motif-last';
        if (m.isInterruptor) cls += ' lr-base-motif-interruptor';
      }
      // Per-base hover tooltip: "Base T · position N · chr:coord · Motif M (unit TCTA)"
      const parts = [base];
      parts.push('position ' + (idx + 1) + ' / ' + bases.length);
      if (coordBase != null && coordChr) {
        parts.push(coordChr + ':' + (coordBase + idx).toLocaleString());
      }
      if (idx < repeatStart)      parts.push('5′ flank');
      else if (idx >= repeatEnd)  parts.push("3′ flank");
      else if (m) {
        if (m.isInterruptor) parts.push('interruptor');
        else parts.push('Motif ' + m.motifNumber + ' pos ' + (m.posInGroup + 1) + '/' + m.motifLen);
      } else                      parts.push('ISFG min range (between repeat + outer flank)');
      html += '<span class="' + cls + '" title="' + parts.join(' · ') + '">' + base + '</span>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// Toggle called from the flanking button inside the accordion.
function toggleRefSeqFlanking(locusName) {
  const root = document.getElementById('lr-refseq-' + cssEscapeId(locusName));
  if (!root) return;
  const refData = getRefSequence(locusName);
  if (!refData) return;
  const showing    = root.dataset.showing === 'full';
  const nextShow   = !showing;
  root.dataset.showing = nextShow ? 'full' : 'repeat';
  const gridHost = root.querySelector('.lr-refseq-grid-container');
  const repeatStructure = computeRepeatStructure(refData, getLocusInfo(locusName));
  if (gridHost) gridHost.innerHTML = renderRefSequenceGrid(refData, { showFlanking: nextShow, repeatStructure });
  const btn = root.querySelector('.lr-refseq-toggle-btn');
  if (btn) btn.textContent = nextShow ? 'Hide flanking' : 'Show ±100 bp flanking';
}

// Safe id-suffix for locus names containing slashes / dashes (e.g.
// DYS385a/b, Y-Indel). Turns into CSS-safe id.
function cssEscapeId(s) { return String(s).replace(/[^A-Za-z0-9_-]/g, '_'); }

// ═══════════════════════════════════════════════════════════════════
// Repeat-structure parsers (Q2 motif boxing — v71)
//
// Three parsers in a fallback chain, used by renderRefSequenceGrid to
// draw visual boxes around each motif unit in the historical repeat:
//
//   Phase 3:  STRNaming v1.2 — "TATC[2]TGTC[n]TATC[n]"
//   Phase 2:  Historical bracket — "[TCTA]3 TCTG [TCTA]12"
//   Phase 1:  Simple motif — from locus.ru when sequence = (motif)+
//
// Every parser returns null when its input doesn't parse/validate,
// letting the caller try the next simpler phase. Final fallback is
// no-boxing — the grid renders bases plainly, same as before.
// ═══════════════════════════════════════════════════════════════════

// Validate a token array against the actual repeat sequence AND locate
// where the bracket-described repeat sits inside the sequence.
//
// FSSG's `sequences.historicalRepeat` is actually the ISFG Minimum
// Range — which includes a few bp of "min-range flank" on each side of
// the true historical repeat core. The bracket notation
// (e.g. "[TCTA]15") describes only the core, so we locate it as a
// substring inside the ISFG range rather than requiring length equality.
//
// Returns { tokens, startOffset, length } on success (startOffset is
// the 0-based offset into `sequence` where the first token begins),
// or null when the tokens don't appear in the sequence as described.
function _validateAndLocate(tokens, sequence) {
  if (!Array.isArray(tokens) || !tokens.length) return null;
  // Build the expected sequence from tokens, uppercase-normalised
  let expected = '';
  for (const t of tokens) {
    if (!t.motif || !Number.isFinite(t.count) || t.count < 0) return null;
    expected += t.motif.toUpperCase().repeat(t.count);
  }
  if (!expected) return null;
  const seqUp = String(sequence || '').toUpperCase();
  const pos   = seqUp.indexOf(expected);
  if (pos < 0) return null;
  return { tokens, startOffset: pos, length: expected.length };
}

// Phase 1: Simple repeat — find the longest run of exact `motif`
// repeats anywhere in the sequence. The run's start/length are
// recorded so the renderer boxes only that span, leaving inner-flank
// bases (between the min-range boundary and the motif run) plain.
function _parseSimpleRepeat(sequence, motif) {
  if (!sequence || !motif) return null;
  const m = String(motif).toUpperCase().replace(/[^ATGCN]/g, '');
  if (!m || m.length === 0) return null;
  const seqUp = String(sequence).toUpperCase();

  // Scan for longest contiguous run of m at every motif-aligned offset.
  let bestStart = -1, bestCount = 0;
  for (let offset = 0; offset < m.length; offset++) {
    for (let start = offset; start + m.length <= seqUp.length; start += m.length) {
      let count = 0;
      let k = start;
      while (k + m.length <= seqUp.length && seqUp.substr(k, m.length) === m) {
        count++;
        k += m.length;
      }
      if (count > bestCount) { bestCount = count; bestStart = start; }
      // Jump past the matched run so we don't re-scan overlapping starts.
      if (count > 0) start = k - m.length;
    }
  }
  if (bestCount < 2) return null;  // require at least 2 repeats to call it a motif run
  const tokens = [{ motif: m, count: bestCount, interruptor: false, label: m }];
  return _validateAndLocate(tokens, sequence);
}

// Phase 2: Historical bracket — "[TCTA]3 TCTG [TCTA]12".
// Tokens look like either "[MOTIF]N" (repeated motif) or a bare
// "MOTIF" (count=1, treated as an interruptor). Lowercase motifs are
// rendered in lowercase but compared case-insensitively — FSSG uses
// lowercase to mark reverse-strand annotation.
function _parseHistoricalBracket(notation, sequence) {
  if (!notation || !sequence) return null;
  const cleaned = String(notation).replace(/\s+/g, ' ').trim();
  if (!cleaned) return null;

  const tokens = [];
  let i = 0;
  while (i < cleaned.length) {
    if (cleaned[i] === ' ') { i++; continue; }
    if (cleaned[i] === '[') {
      const closeIdx = cleaned.indexOf(']', i);
      if (closeIdx < 0) return null;
      const motif = cleaned.substring(i + 1, closeIdx);
      i = closeIdx + 1;
      let countStr = '';
      while (i < cleaned.length && /[0-9]/.test(cleaned[i])) { countStr += cleaned[i]; i++; }
      const count = parseInt(countStr, 10);
      if (!motif || !Number.isFinite(count)) return null;
      tokens.push({ motif: motif.toUpperCase(), count, interruptor: false, label: motif });
    } else if (/[A-Za-z]/.test(cleaned[i])) {
      let motif = '';
      while (i < cleaned.length && /[A-Za-z]/.test(cleaned[i])) { motif += cleaned[i]; i++; }
      if (motif) tokens.push({ motif: motif.toUpperCase(), count: 1, interruptor: true, label: motif });
    } else {
      i++;
    }
  }
  return _validateAndLocate(tokens, sequence);
}

// Phase 3: STRNaming v1.2 — "TATC[2]TGTC[n]TATC[n]".
// Motif comes first, then "[N]" with N = fixed count or lowercase "n"
// meaning variable. Multi-[n] cases are complex (ambiguous base
// distribution); we resolve single-[n] from remaining base count and
// fall back otherwise. Alternative representations separated by
// newlines — we use the first.
function _parseStrNaming(notation, sequence) {
  if (!notation || !sequence) return null;
  const firstVariant = String(notation).split(/\r?\n/)[0].replace(/\s+/g, ' ').trim();
  if (!firstVariant) return null;

  const tokens = [];
  let i = 0;
  while (i < firstVariant.length) {
    if (firstVariant[i] === ' ' || firstVariant[i] === '|' || firstVariant[i] === '/') { i++; continue; }
    let motif = '';
    while (i < firstVariant.length && /[A-Za-z]/.test(firstVariant[i])) {
      motif += firstVariant[i]; i++;
    }
    if (!motif) return null;
    if (firstVariant[i] !== '[') return null;
    const closeIdx = firstVariant.indexOf(']', i);
    if (closeIdx < 0) return null;
    const countStr = firstVariant.substring(i + 1, closeIdx).trim();
    let count, isVar = false;
    if (countStr === 'n' || countStr === 'N') { isVar = true; count = -1; }
    else {
      count = parseInt(countStr, 10);
      if (!Number.isFinite(count)) return null;
    }
    tokens.push({ motif: motif.toUpperCase(), count, interruptor: false, isVar, label: motif });
    i = closeIdx + 1;
  }
  if (!tokens.length) return null;

  // Resolve variable-count tokens.
  // For [n] tokens we scan the sequence: for each [n] motif, find how
  // many copies appear contiguously at the right offset. This is
  // implemented via a tentative build-and-locate: try counts from 0 up
  // to some sensible max and see if the resulting expected-string is
  // findable in the sequence. For safety we only resolve the
  // single-variable case automatically; multi-[n] cases fall back.
  const varTokens = tokens.filter(t => t.isVar);
  if (varTokens.length === 0) {
    return _validateAndLocate(tokens, sequence);
  }
  if (varTokens.length > 1) return null;  // defer to Phase 2

  const v = varTokens[0];
  const fixedBases = tokens.filter(t => !t.isVar)
    .reduce((s, t) => s + t.motif.length * t.count, 0);
  // Iterate from largest possible count DOWN — we want the LONGEST
  // motif run that validates. Starting small would return 0 or 1
  // copies immediately (technically valid, but truncates what should
  // be a 10-motif run to a single box).
  const maxCount = Math.floor((sequence.length - fixedBases) / v.motif.length);
  for (let tryCount = maxCount; tryCount >= 1; tryCount--) {
    v.count = tryCount;
    v.isVar = false;
    const located = _validateAndLocate(tokens, sequence);
    if (located && located.length >= v.motif.length * 2) return located;  // require ≥2 motifs
  }
  return null;
}

// Master entry — try Phase 3 → 2 → 1. Each phase returns
// { tokens, startOffset, length } or null. We attach the phase label
// and return to the caller. The caller treats null as "no boxes,
// render bases plainly" — never drawing wrong boxes is the invariant.
function computeRepeatStructure(refData, locusInfo) {
  const seq = refData && refData.sequences && refData.sequences.historicalRepeat;
  if (!seq) return null;

  const strNaming = refData && refData.bracketing && refData.bracketing.strNaming_v1_2;
  if (strNaming) {
    const r = _parseStrNaming(strNaming, seq);
    if (r) return Object.assign({ source: 'strNaming_v1_2' }, r);
  }
  const histBracket = refData && refData.bracketing && refData.bracketing.historical;
  if (histBracket) {
    const r = _parseHistoricalBracket(histBracket, seq);
    if (r) return Object.assign({ source: 'historical_bracket' }, r);
  }
  const ru = locusInfo && locusInfo.ru;
  if (ru) {
    const r = _parseSimpleRepeat(seq, ru);
    if (r) return Object.assign({ source: 'simple_motif' }, r);
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════
// Kit amplicon visual position bar (Q1 — v71)
// Renders two horizontal SVG lanes — CE kits on a bp-size axis, NGS
// kits on a genomic-coord axis — so the user can see at a glance
// which kits cover the locus and where their amplicons sit.
// ═══════════════════════════════════════════════════════════════════

function _renderKitBarsLane(kits, opts) {
  // kits: [{name, start, end, dye, colorHex, label, tooltipExtra}]
  // opts: { axisFormat: 'bp'|'coord', isfg: {start, end}|null }
  const N = kits.length;
  if (!N) return '';
  const W = 900, ML = 260, MR = 30, MT = 22;
  const rowH = 26;
  const H = MT + 10 + N * rowH + 12;
  const barsW = W - ML - MR;

  // Compute domain — include ISFG range if provided
  const vals = [];
  kits.forEach(k => { vals.push(k.start, k.end); });
  if (opts.isfg) { vals.push(opts.isfg.start, opts.isfg.end); }
  const dMin = Math.min(...vals);
  const dMax = Math.max(...vals);
  const rawPad = (dMax - dMin) * 0.08;
  const pad = rawPad < 2 ? 10 : rawPad;
  const domMin = dMin - pad;
  const domMax = dMax + pad;
  const scale = v => ML + ((v - domMin) / (domMax - domMin)) * barsW;

  const fmt = (v) => opts.axisFormat === 'bp' ? (Math.round(v) + ' bp') : Math.round(v).toLocaleString();

  // Truncate kit names that would overflow the label column.
  // ML=260 minus dot+gap (~22px) = 238px for the name. At font-size 10,
  // proportional font ~5.5 px/char → ~43 chars safely. Leave margin for
  // heading/descender → ~38 chars cap, else truncate with ellipsis.
  const truncate = (s, max) => (s && s.length > max ? s.slice(0, max - 1) + '…' : s);

  let svg = '<svg class="lr-kitbars-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  svg += '<rect x="0" y="0" width="' + W + '" height="' + H + '" class="lr-kitbars-bg"/>';

  // Axis ticks — 5 evenly spaced labels
  for (let t = 0; t <= 4; t++) {
    const v = domMin + (domMax - domMin) * (t / 4);
    const xx = scale(v);
    svg += '<line x1="' + xx + '" x2="' + xx + '" y1="' + MT + '" y2="' + (H - 4) + '" class="lr-kitbars-tick"/>';
    svg += '<text x="' + xx + '" y="' + (MT - 6) + '" class="lr-kitbars-axis-label">' + fmt(v) + '</text>';
  }

  // ISFG background highlight (NGS lane only)
  if (opts.isfg) {
    const ix1 = scale(opts.isfg.start);
    const ix2 = scale(opts.isfg.end);
    const isfgLen = opts.isfg.end - opts.isfg.start + 1;
    const tip = 'ISFG Minimum Range · ' + opts.isfg.chr + ':' + opts.isfg.start.toLocaleString() + '–' + opts.isfg.end.toLocaleString() + ' (' + isfgLen + ' bp)\n\nThe ISFG DNA Commission\'s consensus definition of this locus\'s canonical span. Every compliant forensic kit must cover at least this region. Amplicons extending beyond capture flanking context — needed for NGS read mapping, quality scoring, and flanking-SNP annotation.';
    svg += '<rect x="' + ix1 + '" y="' + (MT + 2) + '" width="' + Math.max(2, ix2 - ix1) + '" height="' + (H - MT - 6) + '" class="lr-kitbars-isfg-bg">';
    svg += '<title>' + tip + '</title>';
    svg += '</rect>';
  }

  // Per-kit rows
  kits.forEach((k, i) => {
    const y  = MT + 10 + i * rowH;
    const x1 = scale(k.start);
    const x2 = scale(k.end);
    const bw = Math.max(2, x2 - x1);
    const color = k.colorHex || 'var(--acc)';
    const displayName = truncate(k.name, 38);
    const tooltipFull = escHtml(k.name) + (k.dye ? ' · dye ' + escHtml(k.dye) : '') + '\n' + escHtml(k.tooltipExtra || k.label || '');

    // Dye indicator — small filled circle at the left edge. Replaces
    // the old wide rect badge that overlapped long kit names.
    if (k.dye) {
      svg += '<circle cx="10" cy="' + (y + 10) + '" r="5" fill="' + color + '" fill-opacity="0.55" stroke="' + color + '" stroke-width="1"><title>Dye: ' + escHtml(k.dye) + '</title></circle>';
    }
    // Kit name — left-aligned, starts just right of the dye dot.
    // Truncated with ellipsis if too long for the label column.
    svg += '<text x="' + (k.dye ? 22 : 8) + '" y="' + (y + 14) + '" class="lr-kitbars-kit-label" text-anchor="start">' +
      '<title>' + tooltipFull + '</title>' + escHtml(displayName) + '</text>';

    // Amplicon bar
    svg += '<rect x="' + x1 + '" y="' + (y + 3) + '" width="' + bw + '" height="14" rx="2" ' +
      'fill="' + color + '" fill-opacity="0.35" stroke="' + color + '" stroke-width="1">';
    svg += '<title>' + tooltipFull + '</title></rect>';
    // Label inside bar if wide enough
    if (bw > 70 && k.label) {
      svg += '<text x="' + ((x1 + x2) / 2) + '" y="' + (y + 13) + '" class="lr-kitbars-bar-label" text-anchor="middle">' + escHtml(k.label) + '</text>';
    }
  });
  svg += '</svg>';
  return svg;
}

// Lazy render of the flanking variants table. Called when the user
// clicks "Show variant table" inside the Flanking SNPs card. Renders
// inline beneath the summary, with a second click collapsing back.
function toggleFlankingVariants(locusName) {
  const host = document.getElementById('lr-variants-' + cssEscapeId(locusName));
  if (!host) return;
  const btn = host.parentElement.querySelector('.lr-variants-toggle');
  if (host.style.display === 'none') {
    // Expand + render if not already rendered
    if (!host.dataset.rendered) {
      host.innerHTML = renderFlankingVariantsTable(locusName);
      host.dataset.rendered = '1';
    }
    host.style.display = 'block';
    if (btn) btn.textContent = 'Hide variant table ▾';
  } else {
    host.style.display = 'none';
    if (btn) btn.textContent = 'Show variant table ▸';
  }
}

// Render the full flanking variants table for one locus. Shows MAF bars
// per population (five columns), highlighting MAF ≥ 1% as the threshold
// that typically matters for primer design / allele-dropout risk.
function renderFlankingVariantsTable(locusName) {
  const variants = getFlankingVariants(locusName);
  if (!variants.length) return '<div style="color:var(--tx3);font-size:11px;padding:8px">No variants.</div>';

  const POPS = [
    { key: 'afr', label: 'AFR', full: 'African / African American' },
    { key: 'eas', label: 'EAS', full: 'East Asian' },
    { key: 'eur', label: 'EUR', full: 'European (non-Finnish)' },
    { key: 'lat', label: 'LAT', full: 'Latino / Admixed American' },
    { key: 'sas', label: 'SAS', full: 'South Asian' }
  ];

  let h = '<div class="lr-vartable-wrap">';
  h += '<table class="lr-vartable">';
  h += '<thead><tr>';
  h += '<th>rsID</th><th>Type</th><th>Position</th><th>Ref→Alt</th><th>IUPAC</th>';
  POPS.forEach(p => h += '<th title="' + p.full + '">' + p.label + '</th>');
  h += '</tr></thead><tbody>';
  variants.forEach(v => {
    h += '<tr>';
    const rsLink = v.rsID ? '<a href="https://www.ncbi.nlm.nih.gov/snp/' + encodeURIComponent(v.rsID) + '" target="_blank" rel="noopener">' + escHtml(v.rsID) + '</a>' : '—';
    h += '<td class="lr-vartable-rs">' + rsLink + '</td>';
    h += '<td class="lr-vartable-type">' + escHtml(v.type || '—') + '</td>';
    h += '<td class="lr-vartable-pos"><code>' + (v.chr ? 'chr' + v.chr + ':' : '') + (v.coordStart || '—') + '</code></td>';
    h += '<td class="lr-vartable-change"><code>' + escHtml(v.ref || '?') + ' → ' + escHtml(v.alt || '?') + '</code></td>';
    h += '<td class="lr-vartable-iupac"><code>' + escHtml(v.iupac || '') + '</code></td>';
    POPS.forEach(p => {
      const m = v.maf && v.maf[p.key];
      if (m == null) {
        h += '<td class="lr-vartable-maf lr-maf-na">—</td>';
      } else {
        const pct = m * 100;
        const high = m >= 0.01;
        const bar = Math.max(1, Math.min(100, Math.round(pct * 5))); // scale so 20% = full bar
        const cls = 'lr-vartable-maf' + (high ? ' lr-maf-high' : '');
        h += '<td class="' + cls + '" title="' + p.full + ': ' + pct.toFixed(3) + '%">';
        h += '<div class="lr-maf-bar" style="width:' + bar + '%"></div>';
        h += '<span class="lr-maf-num">' + (pct < 0.01 ? pct.toFixed(3) : pct.toFixed(2)) + '%</span>';
        h += '</td>';
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  h += '<div class="lr-vartable-footer">gnomAD v3.1.2 allele frequencies · flanking regions of locus · MAF ≥ 1% highlighted (primer-design risk)</div>';
  h += '</div>';
  return h;
}

// ── Public entry ──────────────────────────────────────────────────
function showKitReference(initialLocus) {
  if (!_kitRefLoaded) {
    // First open — lazy-load data files in parallel then re-enter.
    Promise.all([loadStrData(), loadReferenceSequences()])
      .then(() => { _mergeFssgKitsIntoStrData(); showKitReference(initialLocus); });
    return;
  }
  renderKitReference(initialLocus);
}

// ── Merge FSSG-only NGS kits into STR_DATA.kits + STR_KITS ──────
// reference-sequences.json::sequences[locus].kitAmplicons carries kit
// names for PowerSeq 46GY, IDSeek OmniSTR Global, IDSeek mYSTR, and
// ForenSeq Signature Prep/Plus — kits that exist in FSSG but weren't
// in Studios's original loci.json::kits.
//
// Without this merge, those kits would show in the Kit Amplicon
// Coverage detail-view bar but NOT as filter buttons in the list
// view, because the filter row iterates STR_DATA.kits.
//
// Strategy: build a synthetic kit record for each FSSG-only kit with
// its coverage derived from which loci mention it in kitAmplicons.
// Inject into STR_DATA.kits (for the filter row) AND STR_KITS (for
// kitChips, getKitsForLocus, and all other helpers). Idempotent —
// guarded by `_fssgKitsMerged` so repeat calls are no-ops.
let _fssgKitsMerged = false;
function _mergeFssgKitsIntoStrData() {
  if (_fssgKitsMerged) return;
  if (!STR_DATA || !STR_DATA.kits || !_refSeqData || !_refSeqData.sequences) return;

  // Same alias dedup as in kitChips — FSSG's "Precision ID … v2" label
  // is the same product as Studios's "Precision ID GlobalFiler NGS".
  const FSSG_KIT_ALIASES = {
    'Precision ID GlobalFiler NGS STR Panel v2': 'Precision ID GlobalFiler NGS'
  };

  // Collect FSSG-only kits + their locus coverage
  const fssgKitLoci = {};  // kitName → { locus: ampliconObj }
  for (const [locusName, rec] of Object.entries(_refSeqData.sequences)) {
    if (!rec.kitAmplicons) continue;
    for (const [kitName, amp] of Object.entries(rec.kitAmplicons)) {
      if (STR_DATA.kits[kitName]) continue;                         // already native
      const aliasOf = FSSG_KIT_ALIASES[kitName];
      if (aliasOf && STR_DATA.kits[aliasOf]) continue;              // alias of native → skip
      if (!fssgKitLoci[kitName]) fssgKitLoci[kitName] = {};
      fssgKitLoci[kitName][locusName] = {
        dye: null,
        min: null,
        max: null,
        ampliconGrch38: amp.grch38 || null
      };
    }
  }

  // Materialize synthetic kit entries
  for (const [kitName, lociMap] of Object.entries(fssgKitLoci)) {
    const meta = (typeof KIT_SHORTCODES !== 'undefined' && KIT_SHORTCODES[kitName]) || null;
    STR_DATA.kits[kitName] = {
      fullName:   kitName,
      shortCode:  (meta && meta.short) || kitName.slice(0, 3),
      chipColor:  (meta && meta.color) || null,
      platform:   'NGS',
      channels:   null,
      loci:       lociMap,
      _fromFssg:  true
    };
    // STR_KITS uses the flattened shape — loci map is locus → dye
    // (null for NGS), rawLoci is the full per-locus info object.
    const flat = {};
    for (const locusName of Object.keys(lociMap)) flat[locusName] = null;
    STR_KITS[kitName] = { loci: flat, fullName: kitName, channels: null, rawLoci: lociMap };
  }

  _fssgKitsMerged = true;
}
function closeKitReference() {
  document.getElementById('kit-ref-modal').classList.remove('show');
}

// Renders the full modal body into #kit-ref-root. Called once on open
// and also whenever the kit scope changes (so the dye-row can narrow
// to just the dyes that kit uses).
function renderKitReference(initialLocus) {
  const root = document.getElementById('kit-ref-root');
  if (!root) return;
  const kitNames    = Object.keys(STR_DATA.kits || {}).join(', ');
  const version     = STR_DATA.version     || '—';
  const lastUpdated = STR_DATA.lastUpdated || '—';
  const source      = STR_DATA.source      || '—';

  let h = '';
  // Header row with title + close button
  h += '<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px">';
  h += '<div style="flex:1">';
  h += '<h2 style="font-size:17px;margin:0 0 4px;font-weight:700;letter-spacing:-0.02em">🧬 Loci Reference</h2>';
  h += '<div style="font-size:10px;color:var(--tx3);margin-bottom:6px">Forensic STR locus reference across ' + escHtml(kitNames || '—') + '</div>';
  h += '<div style="font-size:9px;color:var(--tx3);padding:4px 8px;background:var(--bg0);border-radius:6px;display:inline-block">📊 Data version ' + escHtml(version) + ' · Last updated ' + escHtml(lastUpdated) + ' · Source: ' + escHtml(source) + '</div>';
  h += '</div>';
  h += '<button type="button" class="hb" onclick="closeKitReference()" style="padding:0;width:28px;height:28px;font-size:16px;flex-shrink:0">×</button>';
  h += '</div>';

  // Top bar: search + view toggle + print
  h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">';
  h += '<input id="kr-search" class="hb" style="flex:1;min-width:200px;padding:6px 10px;font-size:12px" placeholder="🔎 Search locus, chromosome, motif, category..." oninput="_kitRefFilter.search=this.value;renderKitRefContent()">';
  h += '<div style="display:flex;gap:2px">';
  ['cards', 'table', 'compare'].forEach(v => {
    const icon = { cards: '▤', table: '☰', compare: '▦' }[v];
    const label = v.charAt(0).toUpperCase() + v.slice(1);
    h += '<button class="hb kr-view-btn" data-view="' + v + '" onclick="krSetView(\'' + v + '\')" style="font-size:10px;padding:4px 10px">' + icon + ' ' + label + '</button>';
  });
  h += '</div>';
  h += '<button class="hb" style="font-size:10px;padding:4px 10px" onclick="printKitReference()">🖨 Print</button>';
  h += '</div>';

  // Filter row — platform / kit / type / dye / codis / clear
  // Layout is a single flex row that wraps; each filter track gets its
  // own labelled sub-group. All buttons (including kits) for click-
  // through consistency — no dropdowns. When Platform=NGS is active,
  // the Dye track hides itself because NGS kits have no dye channels
  // (they use Unique Dual Indices / UDIs instead).
  h += '<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap;font-size:10px">';

  // Platform filter — NEW. Filters both the visible Kit buttons and the
  // cards/table/compare view to CE-only or NGS-only. `all` shows both.
  h += '<div style="display:flex;gap:2px;align-items:center"><span style="color:var(--tx3);padding:4px 6px">Platform:</span>';
  ['all', 'CE', 'NGS'].forEach(p => {
    h += '<button class="hb kr-platform-btn" data-platform="' + p + '" onclick="krSetPlatform(\'' + p + '\')" style="font-size:10px;padding:3px 8px" title="' + (p === 'CE' ? 'Capillary electrophoresis kits (dye channels)' : p === 'NGS' ? 'Next-generation sequencing kits (no dye channels)' : 'Show both CE and NGS kits') + '">' + p + '</button>';
  });
  h += '</div>';

  // Kit filter — button row (was a dropdown, now click-toggleable
  // buttons for consistency with every other filter track). When a
  // Platform is active, kits from the other platform are omitted from
  // the row entirely. Each button shows the kit's loci count in parens.
  h += '<div style="display:flex;gap:2px;align-items:center;flex-wrap:wrap"><span style="color:var(--tx3);padding:4px 6px">Kit:</span>';
  // Sort: CE kits first (alpha), then NGS kits (alpha). Makes the row
  // read platform-grouped without needing two separate sub-rows.
  const kitEntries = Object.entries(STR_DATA.kits || {})
    .filter(([, k]) => {
      if (_kitRefFilter.platform === 'all') return true;
      const p = k.platform || 'CE';
      return p === _kitRefFilter.platform;
    })
    .sort((a, b) => {
      const pa = a[1].platform || 'CE';
      const pb = b[1].platform || 'CE';
      if (pa !== pb) return pa === 'CE' ? -1 : 1;   // CE first
      return a[0].localeCompare(b[0]);
    });
  kitEntries.forEach(([kit, k]) => {
    const count = Object.keys(k.loci || {}).length;
    const p = k.platform || 'CE';
    // Tint NGS kits by their accent color so they scan-read distinctly
    // from the CE kits in the same row. CE kits stay with default
    // button styling (their colour-coding lives in the dye filter).
    const meta = (typeof KIT_SHORTCODES !== 'undefined' && KIT_SHORTCODES[kit]) || null;
    const tint = (p === 'NGS' && meta && meta.color) ? meta.color : null;
    const extraStyle = tint
      ? ';color:' + tint + ';border-color:' + tint + '55;background:' + tint + '15'
      : '';
    h += '<button class="hb kr-kit-btn" data-kit="' + escHtml(kit) + '" data-platform="' + p + '" ' +
      'onclick="krSetKit(\'' + escHtml(kit).replace(/'/g, "\\'") + '\')" ' +
      'style="font-size:10px;padding:3px 8px' + extraStyle + '" ' +
      'title="' + escHtml(k.fullName || kit) + ' · ' + p + ' · ' + count + ' loci">' +
      escHtml(kit) + ' <span style="color:var(--tx3)">(' + count + ')</span></button>';
  });
  h += '</div>';

  // Type filter
  h += '<div style="display:flex;gap:2px;align-items:center"><span style="color:var(--tx3);padding:4px 6px">Type:</span>';
  ['all', 'autosomal', 'sex', 'qc'].forEach(t => {
    h += '<button class="hb kr-type-btn" data-type="' + t + '" onclick="krSetType(\'' + t + '\')" style="font-size:10px;padding:3px 8px">' + t + '</button>';
  });
  h += '</div>';

  // Dye filter — hidden entirely when Platform=NGS (NGS kits have no
  // dye channels). When a specific kit is scoped, narrow to just the
  // dyes that kit uses (hides purple on a 4-dye CE kit, etc.).
  if (_kitRefFilter.platform !== 'NGS') {
    const allDyes = ['blue', 'green', 'yellow', 'red', 'purple', 'orange'];
    const scopedKit = _kitRefFilter.kit && STR_DATA.kits[_kitRefFilter.kit];
    const kitDyes = scopedKit
      ? new Set(Object.values(scopedKit.loci || {}).map(x => x.dye).filter(Boolean))
      : null;
    const dyesToShow = kitDyes ? allDyes.filter(d => kitDyes.has(d)) : allDyes;
    h += '<div style="display:flex;gap:2px;align-items:center"><span style="color:var(--tx3);padding:4px 6px">Dye:</span>';
    dyesToShow.forEach(d => {
      h += '<button class="hb kr-dye-btn" data-dye="' + d + '" onclick="krSetDye(\'' + d + '\')" style="font-size:10px;padding:3px 8px;color:' + DYE_COLORS[d] + ';border-color:' + DYE_COLORS[d] + '40">' + d + '</button>';
    });
    h += '</div>';
  }

  // CODIS filter
  h += '<div style="display:flex;gap:2px;align-items:center"><span style="color:var(--tx3);padding:4px 6px">CODIS:</span>';
  ['13', '20', 'ESS'].forEach(c => {
    h += '<button class="hb kr-codis-btn" data-codis="' + c + '" onclick="krSetCodis(\'' + c + '\')" style="font-size:10px;padding:3px 8px">' + c + '</button>';
  });
  h += '</div>';

  h += '<button class="hb" onclick="krClearFilters()" style="font-size:10px;padding:3px 10px;color:var(--tx2)" title="Reset all filters">✕ Clear</button>';
  h += '</div>';

  // Dye-palette inheritance hint (scoped kit drives card accent colour).
  // Hidden when an NGS-only view is active since dye colour isn't
  // meaningful there — cards just use a neutral accent.
  if (_kitRefFilter.platform !== 'NGS') {
    h += '<div style="font-size:10px;color:var(--tx3);margin-bottom:10px;padding:6px 10px;background:var(--bg0);border-radius:6px;border-left:3px solid var(--acc)">';
    h += '🎨 Default dye colors are from <b>GlobalFiler IQC</b>. Select a different kit above to re-color the cards with that kit\'s dye assignments.';
    h += '</div>';
  }

  // Content area — flex-grow so the scrollable region fills the modal.
  h += '<div id="kr-content" style="flex:1;overflow-y:auto;min-height:0"></div>';

  // Dye legend footer — always visible so channel colours are clear.
  h += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--brd);font-size:10px;display:flex;gap:12px;flex-wrap:wrap;color:var(--tx0);font-weight:600">';
  h += '<span>🔵 6-FAM/FL/BT</span><span>🟢 VIC/JOE/BTG</span><span>🟡 NED/TMR/BTY</span><span>🔴 TAZ/CXR/BTR</span><span>🟣 SID/WEN/BTP</span><span>🟠 LIZ (size standard)</span>';
  h += '</div>';

  root.innerHTML = h;

  // Show the modal. Wire Escape + backdrop-click dismiss (single-use
  // listeners cleared on close).
  const modal = document.getElementById('kit-ref-modal');
  modal.classList.add('show');
  function onKey(e) { if (e.key === 'Escape') { closeKitReference(); document.removeEventListener('keydown', onKey); } }
  function onClick(e) { if (e.target === modal) { closeKitReference(); modal.removeEventListener('click', onClick); } }
  document.addEventListener('keydown', onKey);
  modal.addEventListener('click', onClick);

  // Defer state application + first content render one tick so the DOM
  // fully paints before we attach styles to newly-created buttons.
  setTimeout(() => {
    krApplyActiveStates();
    renderKitRefContent();
    if (initialLocus) openLocusDetail(initialLocus);
  }, 30);
}

// Toggle visible "active" styles on filter/view buttons according to
// current filter state. Called after every state change.
function krApplyActiveStates() {
  document.querySelectorAll('.kr-view-btn').forEach(b => {
    const on = b.dataset.view === _kitRefView;
    b.style.background   = on ? 'var(--acc)' : '';
    b.style.color        = on ? '#fff' : '';
    b.style.borderColor  = on ? 'var(--acc)' : '';
    b.style.fontWeight   = on ? '700' : '';
  });
  document.querySelectorAll('.kr-type-btn').forEach(b => {
    const on = b.dataset.type === _kitRefFilter.type;
    b.style.background   = on ? 'var(--acc)' : '';
    b.style.color        = on ? '#fff' : '';
    b.style.borderColor  = on ? 'var(--acc)' : '';
    b.style.fontWeight   = on ? '700' : '';
  });
  document.querySelectorAll('.kr-dye-btn').forEach(b => {
    const d = b.dataset.dye;
    const col = DYE_COLORS[d] || '#888';
    const on = d === _kitRefFilter.dye;
    b.style.background   = on ? col : '';
    b.style.color        = on ? '#fff' : col;
    b.style.borderColor  = on ? col : (col + '40');
    b.style.fontWeight   = on ? '700' : '';
  });
  document.querySelectorAll('.kr-codis-btn').forEach(b => {
    const on = b.dataset.codis === _kitRefFilter.codis;
    b.style.background   = on ? 'var(--acc)' : '';
    b.style.color        = on ? '#fff' : '';
    b.style.borderColor  = on ? 'var(--acc)' : '';
    b.style.fontWeight   = on ? '700' : '';
  });
  // Platform buttons — muted accent to distinguish from filter buttons
  document.querySelectorAll('.kr-platform-btn').forEach(b => {
    const on = b.dataset.platform === _kitRefFilter.platform;
    b.style.background   = on ? 'var(--acc)' : '';
    b.style.color        = on ? '#fff' : '';
    b.style.borderColor  = on ? 'var(--acc)' : '';
    b.style.fontWeight   = on ? '700' : '';
  });
  // Kit buttons — now a row of toggles (was a dropdown). A kit matches
  // only when its key equals the scoped kit.
  document.querySelectorAll('.kr-kit-btn').forEach(b => {
    const on = b.dataset.kit === _kitRefFilter.kit;
    b.style.background   = on ? 'var(--acc)' : '';
    b.style.color        = on ? '#fff' : '';
    b.style.borderColor  = on ? 'var(--acc)' : '';
    b.style.fontWeight   = on ? '700' : '';
  });
}

function krSetView(v)  { _kitRefView = v;                                             krApplyActiveStates(); renderKitRefContent(); }
function krSetType(t)  { _kitRefFilter.type = t;                                      krApplyActiveStates(); renderKitRefContent(); }
function krSetDye(d)   { _kitRefFilter.dye = (_kitRefFilter.dye === d ? null : d);    krApplyActiveStates(); renderKitRefContent(); }
function krSetCodis(c) { _kitRefFilter.codis = (_kitRefFilter.codis === c ? null : c);krApplyActiveStates(); renderKitRefContent(); }

// Platform filter — drives Kit button visibility + loci filtering.
// When flipping to NGS we also clear any active dye filter (dye is
// meaningless for NGS) and clear the scoped Kit if it doesn't belong
// to the new platform. Re-renders the whole modal so the Kit / Dye
// rows recompute their visible children.
function krSetPlatform(p) {
  _kitRefFilter.platform = p;
  if (p === 'NGS') _kitRefFilter.dye = null;
  if (_kitRefFilter.kit) {
    const kitPlatform = (STR_DATA.kits[_kitRefFilter.kit] || {}).platform || 'CE';
    if (p !== 'all' && kitPlatform !== p) _kitRefFilter.kit = null;
  }
  renderKitReference();
}

// Kit selector — now a button row. Clicking an already-active kit
// toggles it off (scope-to-all-kits); clicking an inactive one scopes
// to that kit. When a kit is chosen, the dye-button row narrows to
// only the dyes that kit uses, so we re-render the whole modal header
// (cheap) instead of surgically mutating.
function krSetKit(k) {
  const same = _kitRefFilter.kit === k;
  _kitRefFilter.kit = same ? null : (k || null);
  if (_kitRefFilter.kit && _kitRefFilter.dye) {
    const kitDyes = new Set(Object.values(STR_DATA.kits[_kitRefFilter.kit].loci || {}).map(x => x.dye).filter(Boolean));
    if (!kitDyes.has(_kitRefFilter.dye)) _kitRefFilter.dye = null;
  }
  renderKitReference();
}

function krClearFilters() {
  _kitRefFilter = { platform: 'all', type: 'all', dye: null, kit: null, codis: null, search: '' };
  renderKitReference();
}

function filterLoci() {
  const s = (_kitRefFilter.search || '').toLowerCase();
  const scopedKit    = _kitRefFilter.kit && STR_DATA.kits[_kitRefFilter.kit] ? STR_DATA.kits[_kitRefFilter.kit] : null;
  const scopedLocusSet = scopedKit ? new Set(Object.keys(scopedKit.loci)) : null;

  // Platform scope — when CE or NGS is selected without a specific kit,
  // union the loci from every kit on that platform. A locus is in the
  // platform scope if any kit on that platform contains it.
  let platformLocusSet = null;
  if (_kitRefFilter.platform !== 'all' && !scopedKit) {
    platformLocusSet = new Set();
    for (const [, kit] of Object.entries(STR_DATA.kits || {})) {
      const p = kit.platform || 'CE';
      if (p !== _kitRefFilter.platform) continue;
      Object.keys(kit.loci || {}).forEach(n => platformLocusSet.add(n));
    }
  }

  return (STR_DATA.loci || []).filter(x => {
    if (scopedLocusSet && !scopedLocusSet.has(x.n)) return false;
    if (platformLocusSet && !platformLocusSet.has(x.n)) return false;
    if (_kitRefFilter.type !== 'all' && x.t !== _kitRefFilter.type) return false;
    if (_kitRefFilter.codis === '13'  && !x.c13)  return false;
    if (_kitRefFilter.codis === '20'  && !x.c20)  return false;
    if (_kitRefFilter.codis === 'ESS' && !x.c20e) return false;
    if (_kitRefFilter.dye) {
      if (scopedKit) {
        if ((scopedKit.loci[x.n] || {}).dye !== _kitRefFilter.dye) return false;
      } else {
        const kits = getKitsForLocus(x.n);
        if (!kits.some(k => k.dye === _kitRefFilter.dye)) return false;
      }
    }
    if (s) {
      const hay = [x.n, x.chr, x.rm, x.cat, x.hi, x.note, x.t].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(s)) return false;
    }
    return true;
  });
}

function renderKitRefContent() {
  const el = document.getElementById('kr-content');
  if (!el) return;
  const loci = filterLoci();
  if      (_kitRefView === 'cards') el.innerHTML = renderKitRefCards(loci);
  else if (_kitRefView === 'table') el.innerHTML = renderKitRefTable(loci);
  else                              el.innerHTML = renderKitRefCompare(loci);
}

// Three membership badges (CODIS 13 / 20 / ESS) rendered inline.
function codisBadges(x) {
  let h = '';
  if (x.c13)  h += '<span style="background:rgba(59,130,246,0.15);color:#3b82f6;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700">CODIS-13</span>';
  if (x.c20)  h += '<span style="background:rgba(79,209,197,0.15);color:#4fd1c5;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700;margin-left:2px">CODIS-20</span>';
  if (x.c20e) h += '<span style="background:rgba(168,85,247,0.15);color:#a855f7;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700;margin-left:2px">ESS-12</span>';
  return h;
}

// 3-letter kit-shortname chips shown on each locus card/row. Hover-title
// shows the full kit name + dye (or "NGS" when the kit is sequencing).
// Short-code map grows as new kits are added — keep these hand-picked
// so they stay distinctive at a glance.
// Short codes + colors for every kit Studios knows about. Used by
// kitChips() for the list-view tag row. CE kits use their dye color;
// NGS kits get explicit accent colors so they read distinctly from
// the dye-coded CE chips.
const KIT_SHORTCODES = {
  // CE kits (from loci.json)
  'GlobalFiler':             { short: 'GF',   ngs: false },
  'GlobalFiler IQC':         { short: 'Glo',  ngs: false },
  'Investigator 26plex QS':  { short: 'INV',  ngs: false },
  'PowerPlex Fusion 6C':     { short: 'PPF',  ngs: false },
  'MiniFiler':               { short: 'Min',  ngs: false },
  'Identifiler Plus':        { short: 'Ide',  ngs: false },
  'VeriFiler Plus':          { short: 'Ver',  ngs: false },
  'Yfiler Plus':             { short: 'YFP',  ngs: false },
  // NGS kits — in loci.json
  'ForenSeq MainstAY':                         { short: 'MnA',  ngs: true, color: '#14b8a6' },  // teal
  'ForenSeq MainstAY SE':                      { short: 'MnSE', ngs: true, color: '#14b8a6' },  // teal
  'Precision ID GlobalFiler NGS':              { short: 'Pre',  ngs: true, color: '#a855f7' },  // purple
  // NGS kits — only in FSSG kitAmplicons (not in loci.json::kits)
  'PowerSeq 46GY':                             { short: 'PSeq', ngs: true, color: '#f59e0b' },  // amber
  'IDSeek OmniSTR Global':                     { short: 'Omni', ngs: true, color: '#ec4899' },  // pink
  'IDSeek mYSTR':                              { short: 'mY',   ngs: true, color: '#ec4899' },  // pink
  'Precision ID GlobalFiler NGS STR Panel v2': { short: 'Pre2', ngs: true, color: '#a855f7' },  // purple
  'ForenSeq Signature Prep/Plus and MainstAY': { short: 'Sig',  ngs: true, color: '#14b8a6' }   // teal
};

function kitChips(locusName) {
  // STR_KITS already includes FSSG-only kits after _mergeFssgKitsIntoStrData
  // runs on first load, so getKitsForLocus covers everything. No ad-hoc
  // FSSG merge needed here.
  const kits = getKitsForLocus(locusName);
  if (!kits.length) return '<span style="color:var(--tx3);font-size:9px">—</span>';

  const chips = kits.map(k => {
    const meta  = KIT_SHORTCODES[k.kit] || { short: k.kit.slice(0, 3), ngs: !k.dye, color: null };
    const isNgs = meta.ngs || !k.dye;
    const c     = meta.color || (isNgs ? '#64748b' : (DYE_COLORS[k.dye] || '#888'));
    const short = meta.short;
    const tipSuffix = isNgs ? 'NGS' : k.dye;
    return '<span title="' + escHtml(k.kit) + ' · ' + tipSuffix + '" style="display:inline-block;background:' + c + '20;color:' + c + ';padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin:0 2px 2px 0;border:1px solid ' + c + '40">' + escHtml(short) + '</span>';
  }).join('');
  // Wrap in a flex container that line-breaks when chips overflow the
  // card width. `flex` (block-level) ensures the container takes the
  // full parent width so wrap actually triggers; `inline-flex` would
  // size to content and overflow instead.
  return '<div style="display:flex;flex-wrap:wrap;gap:0;line-height:1.6">' + chips + '</div>';
}

// When a kit is scoped, use its own dye assignment; otherwise fall back
// to GlobalFiler IQC (most complete kit) or the first kit containing
// the locus. Keeps card accent colour honest about which kit is in view.
function _kitRefDisplayDye(locusName) {
  const scoped = _kitRefFilter.kit && STR_DATA.kits[_kitRefFilter.kit];
  if (scoped && scoped.loci[locusName]) return scoped.loci[locusName].dye;
  const fallback = STR_KITS['GlobalFiler IQC'] || STR_KITS['GlobalFiler'];
  if (fallback && fallback.loci[locusName]) return fallback.loci[locusName];
  return getKitsForLocus(locusName)[0]?.dye || '';
}

function _kitRefUniverseTotal() {
  const scoped = _kitRefFilter.kit && STR_DATA.kits[_kitRefFilter.kit];
  return scoped ? Object.keys(scoped.loci).length : STR_DATA.loci.length;
}

function _kitRefScopeBadge() {
  if (!_kitRefFilter.kit) return '';
  return ' · <span style="background:var(--acc);color:#fff;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700">Kit: ' + escHtml(_kitRefFilter.kit) + '</span>';
}

// ── Cards view ────────────────────────────────────────────────────
function renderKitRefCards(loci) {
  if (!loci.length) return '<div style="color:var(--tx3);text-align:center;padding:30px">No matching loci</div>';
  let h = '<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">Showing ' + loci.length + ' of ' + _kitRefUniverseTotal() + ' loci' + _kitRefScopeBadge() + '</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">';
  const scopedKit = _kitRefFilter.kit && STR_DATA.kits[_kitRefFilter.kit];
  loci.forEach(x => {
    const dye = _kitRefDisplayDye(x.n);
    const c = DYE_COLORS[dye] || '#888';
    h += '<div class="cd" style="padding:10px;cursor:pointer;border-left:3px solid ' + c + '" onclick="openLocusDetail(\'' + escHtml(x.n) + '\')">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">';
    h += '<div><div style="font-family:monospace;font-weight:700;font-size:13px;color:' + c + '">' + x.n + '</div>';
    h += '<div style="font-size:9px;color:var(--tx3)">' + x.cat + (x.t === 'sex' ? ' · Sex marker' : '') + '</div></div>';
    h += '<div>' + kitChips(x.n) + '</div></div>';
    h += '<div style="font-size:10px;line-height:1.5">';
    h += '<div style="color:var(--tx3)">Chr: <span style="color:var(--tx0)">' + x.chr + '</span></div>';
    h += '<div style="color:var(--tx3)">Repeat: <span style="color:var(--acc);font-family:monospace">' + x.rm + '</span></div>';
    h += '<div style="color:var(--tx3)">Range: <span style="color:var(--tx0)">' + x.ar + '</span>';
    if (x.microvariant) h += ' <span style="background:rgba(234,179,8,0.15);color:#eab308;padding:1px 4px;border-radius:2px;font-size:8px;margin-left:4px">MICROVARIANT</span>';
    h += '</div>';
    if (scopedKit) {
      const ki = scopedKit.loci[x.n] || {};
      if (ki.min != null || ki.max != null) {
        h += '<div style="color:var(--tx3)">Amplicon: <span style="color:var(--tx0);font-family:monospace">' + (ki.min != null ? ki.min : '?') + '–' + (ki.max != null ? ki.max : '?') + ' bp</span></div>';
      }
      if (ki.ladder)     h += '<div style="color:var(--tx3)">Ladder: <span style="color:var(--tx0);font-family:monospace">' + escHtml(ki.ladder) + '</span></div>';
      if (ki.orderInKit) h += '<div style="color:var(--tx3)">Kit position: <span style="color:var(--tx0)">#' + ki.orderInKit + (ki.orderInChannel ? ' (ch. ' + ki.orderInChannel + ')' : '') + '</span></div>';
    }
    if (x.st !== null) h += '<div style="color:var(--tx3)">Stutter: <span style="color:' + (x.st > 13 ? '#eab308' : 'var(--tx0)') + '">' + x.st + '%</span>' + (x.st > 13 ? ' ⚠' : '') + '</div>';
    if (x.mr !== null) h += '<div style="color:var(--tx3)">Mutation: <span style="color:var(--tx0)">' + x.mr + '</span></div>';
    h += '</div>';
    const badges = codisBadges(x);
    if (badges) h += '<div style="margin-top:6px;display:flex;gap:2px;flex-wrap:wrap">' + badges + '</div>';
    if (x.hi || (x.flags && x.flags.length) || x.stutterExtra) {
      h += '<div style="margin-top:6px;padding:5px 7px;background:linear-gradient(135deg, rgba(234,179,8,0.08), rgba(245,158,11,0.04));border:1px solid rgba(234,179,8,0.22);border-left:3px solid #eab308;border-radius:3px">';
      if (x.hi) h += '<div style="font-size:9px;color:#fbbf24;line-height:1.4">✦ ' + escHtml(x.hi) + '</div>';
      if (x.flags && x.flags.length) {
        h += '<div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">' + x.flags.slice(0, 3).map(_flagBadge).join('') + '</div>';
      }
      if (x.stutterExtra) {
        const se = x.stutterExtra;
        const bits = [];
        if (se.compoundStutter) bits.push('Compound ' + se.compoundStutter);
        if (se.minus2nt != null) bits.push('−2 nt ' + se.minus2nt + '%');
        if (se.plus3nt  != null) bits.push('+3 nt '  + se.plus3nt + '%');
        if (bits.length) h += '<div style="margin-top:3px;font-size:9px;color:#f59e0b;font-family:monospace">' + escHtml(bits.join(' · ')) + '</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

// ── Table view ────────────────────────────────────────────────────
function renderKitRefTable(loci) {
  if (!loci.length) return '<div style="color:var(--tx3);text-align:center;padding:30px">No matching loci</div>';
  const scopedKit = _kitRefFilter.kit && STR_DATA.kits[_kitRefFilter.kit];
  let h = '<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">Showing ' + loci.length + ' of ' + _kitRefUniverseTotal() + ' loci' + _kitRefScopeBadge() + '</div>';
  h += '<table style="width:100%;border-collapse:collapse;font-size:10px">';
  h += '<thead><tr style="border-bottom:2px solid var(--brd);color:var(--tx3);font-size:9px">';
  const cols = scopedKit
    ? ['Locus', 'Chr', 'Cat', 'Repeat', 'Range', 'μV', 'Stutter', 'Mut', 'Amplicon', 'Kit #', 'CODIS']
    : ['Locus', 'Chr', 'Cat', 'Repeat', 'Range', 'μV', 'Stutter', 'Mut', 'Kits', 'CODIS'];
  cols.forEach(col => h += '<th style="padding:4px;text-align:left">' + col + '</th>');
  h += '</tr></thead><tbody>';
  const orderedLoci = scopedKit
    ? loci.slice().sort((a, b) => {
        const ao = (scopedKit.loci[a.n] || {}).orderInKit || 999;
        const bo = (scopedKit.loci[b.n] || {}).orderInKit || 999;
        return ao - bo;
      })
    : loci;
  orderedLoci.forEach(x => {
    const dye = _kitRefDisplayDye(x.n);
    const c = DYE_COLORS[dye] || '#888';
    h += '<tr style="border-bottom:1px solid var(--brd);cursor:pointer" onclick="openLocusDetail(\'' + escHtml(x.n) + '\')">';
    h += '<td style="padding:4px;font-family:monospace;font-weight:700;color:' + c + '">' + x.n + '</td>';
    h += '<td style="padding:4px">' + x.chr + '</td>';
    h += '<td style="padding:4px;font-size:9px">' + x.cat + '</td>';
    h += '<td style="padding:4px;font-family:monospace;font-size:9px;color:var(--acc)">' + x.rm + '</td>';
    h += '<td style="padding:4px">' + x.ar + '</td>';
    h += '<td style="padding:4px;text-align:center">' + (x.microvariant ? '<span style="color:#eab308" title="Microvariant alleles known">◇</span>' : '') + '</td>';
    h += '<td style="padding:4px;font-family:monospace;' + (x.st && x.st > 13 ? 'color:#eab308' : '') + '">' + (x.st !== null ? x.st + '%' : '—') + '</td>';
    h += '<td style="padding:4px;font-family:monospace">' + (x.mr !== null ? x.mr : '—') + '</td>';
    if (scopedKit) {
      const ki = scopedKit.loci[x.n] || {};
      h += '<td style="padding:4px;font-family:monospace;font-size:9px">' + (ki.min != null ? ki.min : '?') + '–' + (ki.max != null ? ki.max : '?') + '</td>';
      h += '<td style="padding:4px;font-family:monospace;font-size:9px">#' + (ki.orderInKit || '?') + (ki.orderInChannel ? ' (ch ' + ki.orderInChannel + ')' : '') + '</td>';
    } else {
      h += '<td style="padding:4px">' + kitChips(x.n) + '</td>';
    }
    h += '<td style="padding:4px;font-size:9px">' + (x.c13 ? '13 ' : '') + (x.c20 ? '20 ' : '') + (x.c20e ? 'ESS' : '') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

// ── Compare view ──────────────────────────────────────────────────
function renderKitRefCompare(loci) {
  const kits = Object.keys(STR_KITS).filter(k => k !== 'None');
  if (!kits.length) return '<div style="color:var(--tx3);text-align:center;padding:30px">No kits loaded</div>';
  let h = '<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">Coverage matrix — dye colour per kit (cell = dye channel, blank = not in kit)</div>';
  h += '<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:10px;width:100%">';
  h += '<thead><tr style="border-bottom:2px solid var(--brd)"><th style="padding:4px 6px;text-align:left;position:sticky;left:0;background:var(--bg1)">Locus</th>';
  kits.forEach(k => h += '<th style="padding:4px 6px;text-align:center;font-size:9px">' + k.split(' ')[0] + '<br><span style="color:var(--tx3);font-weight:400">' + (k.split(' ').slice(1).join(' ') || '') + '</span></th>');
  h += '<th style="padding:4px 6px;text-align:center;font-size:9px">CODIS</th><th style="padding:4px 6px;text-align:center;font-size:9px">μV</th></tr></thead><tbody>';
  loci.forEach(x => {
    h += '<tr style="border-bottom:1px solid var(--brd);cursor:pointer" onclick="openLocusDetail(\'' + escHtml(x.n) + '\')">';
    h += '<td style="padding:4px 6px;font-family:monospace;font-weight:700;position:sticky;left:0;background:var(--bg1)">' + x.n + '</td>';
    kits.forEach(k => {
      const dye = STR_KITS[k]?.loci[x.n];
      if (dye) {
        const c = DYE_COLORS[dye];
        const rawInfo = STR_KITS[k].rawLoci?.[x.n] || {};
        h += '<td style="padding:4px 6px;text-align:center;background:' + c + '15;color:' + c + ';font-weight:700;font-size:9px" title="' + rawInfo.min + '–' + rawInfo.max + ' bp">' + (rawInfo.min || '') + '–' + (rawInfo.max || '') + '</td>';
      } else {
        h += '<td style="padding:4px 6px;text-align:center;color:var(--tx3)">—</td>';
      }
    });
    h += '<td style="padding:4px 6px;text-align:center;font-size:8px">' + (x.c13 ? '13 ' : '') + (x.c20 ? '20 ' : '') + (x.c20e ? 'ESS' : '') + '</td>';
    h += '<td style="padding:4px 6px;text-align:center">' + (x.microvariant ? '<span style="color:#eab308">◇</span>' : '') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

// ── Locus detail nested modal (opens on card / row click) ─────────
function openLocusDetail(locusName) {
  const x = getLocusInfo(locusName);
  if (!x) { toast('Locus not found: ' + locusName, 'error'); return; }
  const gfDye = STR_KITS['GlobalFiler']?.loci[x.n];
  const c = DYE_COLORS[gfDye] || '#888';

  let h = '';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">';
  h += '<h2 style="font-size:17px;font-family:monospace;color:' + c + ';margin:0">' + x.n + '</h2>';
  h += '<span style="font-size:11px;color:var(--tx3)">' + x.cat + '</span>';
  const badges = codisBadges(x);
  if (badges) h += '<div style="display:flex;gap:2px">' + badges + '</div>';
  if (x.microvariant) h += '<span style="background:rgba(234,179,8,0.15);color:#eab308;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700">MICROVARIANT</span>';
  if (x.rl) {
    const rlLabel = { 3: 'TRI', 4: 'TETRA', 5: 'PENTA', 6: 'HEXA' }[x.rl];
    const rlColor = { 3: '#eab308', 4: '#64748b', 5: '#a855f7', 6: '#ef4444' }[x.rl] || '#64748b';
    if (rlLabel) h += '<span style="background:' + rlColor + '22;color:' + rlColor + ';padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;border:1px solid ' + rlColor + '66">' + rlLabel + ' · ' + x.rl + 'bp</span>';
  }
  h += '<button type="button" class="hb" onclick="closeLocusDetail()" style="margin-left:auto;padding:0;width:26px;height:26px;font-size:14px">×</button>';
  h += '</div>';

  // Highlights section
  const hasHighlight = x.hi || (x.flags && x.flags.length) || x.stutterExtra;
  if (hasHighlight) {
    h += '<div style="background:linear-gradient(135deg, rgba(234,179,8,0.08), rgba(245,158,11,0.04));border:1px solid rgba(234,179,8,0.25);border-left:4px solid #eab308;border-radius:6px;padding:12px 14px;margin-bottom:12px">';
    h += '<div style="font-size:10px;font-weight:700;color:#eab308;letter-spacing:.05em;margin-bottom:6px">✦ HIGHLIGHTS</div>';
    if (x.hi) h += '<div style="font-size:12px;color:var(--tx0);line-height:1.5;margin-bottom:' + ((x.flags && x.flags.length) || x.stutterExtra ? '8px' : '0') + '">' + escHtml(x.hi) + '</div>';
    if (x.flags && x.flags.length) {
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:' + (x.stutterExtra ? '8px' : '0') + '">';
      x.flags.forEach(f => { h += _flagBadge(f); });
      h += '</div>';
    }
    if (x.stutterExtra) {
      const se = x.stutterExtra;
      h += '<div style="background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:8px 10px;font-size:10px;color:var(--tx0)">';
      h += '<div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Additional stutter (beyond basic ±4 bp)</div>';
      const parts = [];
      if (se.compoundStutter) parts.push('<span><b>Compound stutter:</b> <span style="font-family:monospace;color:#f59e0b">' + escHtml(se.compoundStutter) + '</span></span>');
      if (se.minus2nt != null) parts.push('<span><b>−2 nt stutter:</b> <span style="font-family:monospace;color:' + (se.minus2nt > 3 ? '#ef4444' : '#eab308') + '">' + se.minus2nt + '%</span></span>');
      if (se.plus3nt  != null) parts.push('<span><b>+3 nt stutter:</b> <span style="font-family:monospace;color:' + (se.plus3nt  > 5 ? '#ef4444' : '#eab308') + '">' + se.plus3nt + '%</span></span>');
      if (se.plus2nt  != null) parts.push('<span><b>+2 nt stutter:</b> <span style="font-family:monospace">' + se.plus2nt + '%</span></span>');
      h += '<div style="display:flex;gap:14px;flex-wrap:wrap">' + parts.join('') + '</div>';
      if (se.note) h += '<div style="margin-top:4px;color:var(--tx3);font-size:9px;font-style:italic">' + escHtml(se.note) + '</div>';
      h += '</div>';
    }
    h += '</div>';
  }

  // Core info grid
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;font-size:11px">';
  const fields = [
    ['Chromosome',    x.chr],
    ['Repeat Motif',  x.rm],
    ['Repeat Unit',   (x.ru || '—') + (x.rl ? ' (' + x.rl + 'bp)' : '')],
    ['Allele Range',  x.ar],
    ['Obs. Alleles',  x.oa || '—'],
    ['Isoalleles',    x.iso != null ? x.iso : '—'],
    ['Stutter % (−4 bp)', x.st !== null ? x.st + '%' : '—'],
    ['Mutation Rate', x.mr !== null ? x.mr : '—'],
    ['Type',          x.t]
  ];
  fields.forEach(([k, v]) => {
    h += '<div class="cd" style="padding:6px 8px"><div style="font-size:9px;color:var(--tx3)">' + k + '</div><div style="font-family:monospace;font-size:11px">' + v + '</div></div>';
  });
  h += '</div>';

  // ── Kit Amplicon Coverage — unified visual position bar (v71) ──
