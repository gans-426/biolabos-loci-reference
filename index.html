  // Replaces the previous "Kit Amplicon Ranges (bp)" CE-only table.
  // The matching NGS kit amplicons <details> block further down is
  // also removed (integrated here). Two lanes — CE kits on a bp-size
  // axis, NGS kits on a genomic-coord axis — because they're the
  // same concept expressed in different units.
  //
  // refData is loaded once here and reused by the FSSG v6.1 data
  // blocks further down — previously we redeclared it below, which
  // caused a TDZ error on this earlier reference.
  const refData = getRefSequence(locusName);
  {
    const ceKits = [];
    Object.keys(STR_KITS).filter(k => k !== 'None').forEach(kitName => {
      const info = STR_KITS[kitName].rawLoci && STR_KITS[kitName].rawLoci[x.n];
      if (!info) return;
      const mn = Number(info.min), mx = Number(info.max);
      // Guard against undefined/NaN (the ForenSeq MainstAY SE bug):
      // if the kit record is missing numeric size data, skip it rather
      // than render "undefined" cells.
      if (!Number.isFinite(mn) || !Number.isFinite(mx) || mx <= mn) return;
      const color = DYE_COLORS[info.dye] || '#888';
      ceKits.push({
        name: kitName, start: mn, end: mx,
        dye: info.dye || null, colorHex: color,
        label: mn + '–' + mx + ' bp',
        tooltipExtra: mn + '–' + mx + ' bp · ' + (mx - mn).toFixed(0) + ' bp range' + (info.dye ? ' · dye ' + info.dye : '')
      });
    });

    // NGS kits from reference-sequences.json (FSSG-derived)
    const ngsKits = [];
    const ampl = (refData && refData.kitAmplicons) || {};
    Object.entries(ampl).forEach(([kitName, amp]) => {
      const s = Number(amp.start), e = Number(amp.end);
      if (!Number.isFinite(s) || !Number.isFinite(e) || e < s) return;
      ngsKits.push({
        name: kitName, start: s, end: e,
        dye: null, colorHex: null,
        label: (amp.length != null ? amp.length + ' bp' : ''),
        tooltipExtra: (amp.grch38 || '') + (amp.length ? ' · ' + amp.length + ' bp' : '')
      });
    });

    if (ceKits.length || ngsKits.length) {
      h += '<div class="lr-kitbars-card">';
      h += '<div class="lr-kitbars-head">';
      h += '<span class="lr-kitbars-title">🎯 Kit amplicon coverage</span>';
      h += '<span class="lr-kitbars-stat">' + (ceKits.length + ngsKits.length) + ' kits cover this locus';
      if (ceKits.length && ngsKits.length) h += ' · ' + ceKits.length + ' CE + ' + ngsKits.length + ' NGS';
      else if (ceKits.length) h += ' · CE only';
      else h += ' · NGS only';
      h += '</span></div>';

      if (ceKits.length) {
        const ceTip = 'Capillary electrophoresis (CE) detects STR alleles by separating PCR amplicons by size on an electropherogram. Each bar shows the kit\'s amplicon size range (in base pairs) for this locus — NOT the genomic coordinates. Amplicons of different kits for the same locus can have very different bp sizes depending on primer placement.';
        h += '<div class="lr-kitbars-lane">';
        h += '<div class="lr-kitbars-lane-title" title="' + ceTip + '">🧪 Capillary electrophoresis — amplicon size</div>';
        h += _renderKitBarsLane(ceKits, { axisFormat: 'bp', isfg: null });
        h += '</div>';
      }
      if (ngsKits.length) {
        const isfg = (refData && refData.coordinates && refData.coordinates.grch38 && refData.coordinates.grch38.isfgMinimumRange) || null;
        const ngsTip = 'Next-generation sequencing (NGS) reads the DNA directly. Each bar shows which genomic region (GRCh38 coordinates) the kit amplifies for this locus. NGS kits typically capture more flanking context than the ISFG Minimum Range to support read mapping and flanking-SNP annotation.';
        h += '<div class="lr-kitbars-lane">';
        h += '<div class="lr-kitbars-lane-title" title="' + ngsTip + '">🧬 Next-generation sequencing — genomic position' +
             (isfg ? ' · <span class="lr-kitbars-isfg-caption" title="Hover the shaded rectangle in the chart for details about the ISFG Minimum Range.">shaded = ISFG Minimum Range</span>' : '') +
             '</div>';
        h += _renderKitBarsLane(ngsKits, { axisFormat: 'coord', isfg });
        h += '</div>';
      }
      h += '</div>';
    }
  }

  // Database membership
  h += '<h3 style="font-size:12px;margin:10px 0 6px">Database Membership</h3>';
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px">';
  [['CODIS 13 (original)', x.c13], ['CODIS 20 (expanded)', x.c20], ['ESS 12 (European)', x.c20e]].forEach(([k, v]) => {
    h += '<div class="cd" style="padding:6px 8px;text-align:center"><div style="font-size:9px;color:var(--tx3)">' + k + '</div><div style="font-weight:700;color:' + (v ? 'var(--grn)' : 'var(--tx3)') + '">' + (v ? '✓ YES' : '—') + '</div></div>';
  });
  h += '</div>';

  if (x.lad) h += '<h3 style="font-size:12px;margin:10px 0 6px">Ladder Alleles (GlobalFiler)</h3><div style="background:var(--bg2);padding:8px;border-radius:4px;font-family:monospace;font-size:10px;line-height:1.7;word-break:break-all">' + escHtml(x.lad) + '</div>';

  if (x.g38) {
    h += '<h3 style="font-size:12px;margin:10px 0 6px">Genomic Coordinates</h3>';
    h += '<div style="font-family:monospace;font-size:10px;color:var(--tx2);line-height:1.6">';
    h += '<div>GRCh38 repeat: ' + escHtml(x.g38) + '</div>';
    if (x.g38f) h += '<div>GRCh38 full: ' + escHtml(x.g38f) + '</div>';
    if (x.g37)  h += '<div>GRCh37: '      + escHtml(x.g37) + '</div>';
    h += '</div>';
  }

  if (x.note) h += '<h3 style="font-size:12px;margin:10px 0 6px">Technical note</h3><div style="font-size:11px;color:var(--tx1);line-height:1.5">' + escHtml(x.note) + '</div>';

  // ══════════════════════════════════════════════════════════════
  //  FSSG v6.1 data blocks — new in v69
  //  (refData already declared near the top of this function for the
  //  unified kit-amplicon bar; reused here.)
  //  See PROVENANCE.md and vendor/fssg/README.md for sources.
  // ══════════════════════════════════════════════════════════════

  // (1) Bracketing card — STRNaming v1.2 + Historical side-by-side
  if (refData && refData.bracketing && (refData.bracketing.strNaming_v1_2 || refData.bracketing.historical)) {
    const bn = refData.bracketing;
    h += '<div class="lr-bracket-card">';
    h += '<div class="lr-bracket-title" title="Repeat-structure notation for this locus — two forms shown side-by-side. STRNaming v1.2 is the current ISFG standard (2024 onward); Historical is the pre-2024 legacy notation, retained for backward compatibility with older casework records.">🔖 Bracketing notation</div>';
    if (bn.strNaming_v1_2) {
      const strTip = 'STRNaming v1.2 — the official repeat-structure notation adopted by the ISFG DNA Commission in 2024. Uses "motif[count]" format (e.g. TCTA[15]) and represents variable-count runs with [n]. Designed to be machine-parseable and unambiguous across labs.';
      h += '<div class="lr-bracket-row">';
      h += '<span class="lr-bracket-label" title="' + strTip + '">STRNaming v1.2</span>';
      h += '<code class="lr-bracket-value lr-bracket-value-active">' + escHtml(bn.strNaming_v1_2.replace(/\s*\n\s*/g, '  |  ')) + '</code>';
      h += '<span class="lr-bracket-tag" title="Adopted as the ISFG standard in the 2024 DNA Commission report.">2024 DNA Commission</span>';
      h += '</div>';
    }
    if (bn.historical) {
      const histTip = 'Historical bracketing — legacy notation used 2016–2023. Uses "[motif]count" format (e.g. [TCTA]15). Preserved in Studios for backward reference because a lot of published casework and older validation studies use this form.';
      h += '<div class="lr-bracket-row">';
      h += '<span class="lr-bracket-label" title="' + histTip + '">Historical</span>';
      h += '<code class="lr-bracket-value">' + escHtml(bn.historical) + '</code>';
      h += '<span class="lr-bracket-tag lr-bracket-tag-muted" title="In common use 2016–2023; superseded by STRNaming v1.2.">2016–2023</span>';
      h += '</div>';
    }
    h += '</div>';
  }

  // (2) NGS kit amplicons — merged into the unified "Kit amplicon
  // coverage" visual position bar above. The standalone <details>
  // block was removed in v71 to avoid duplicating the same data.

  // (3) Flanking SNPs summary — always-visible count + "Show table"
  // button that expands a full variant table inline. Variants come from
  // gnomAD v3.1.2 via FSSG's Variant Frequencies sheet.
  const varSummary = getFlankingVariantSummary(locusName);
  if (varSummary && varSummary.total > 0) {
    h += '<div class="lr-variants-card">';
    h += '<div class="lr-variants-head">';
    h += '<span class="lr-variants-title">🔬 Flanking SNPs</span>';
    h += '<span class="lr-variants-stat"><b>' + varSummary.total + '</b> total';
    if (varSummary.highMaf > 0) h += ' · <b class="lr-variants-high">' + varSummary.highMaf + '</b> with MAF ≥ 1%';
    h += '</span>';
    h += '<span class="lr-variants-source">gnomAD v3.1.2 · via FSSG v6.1</span>';
    h += '</div>';
    h += '<div class="lr-variants-actions">';
    h += '<button class="hb lr-variants-toggle" onclick="toggleFlankingVariants(\'' + escHtml(locusName) + '\')">Show variant table ▸</button>';
    h += '</div>';
    h += '<div class="lr-variants-host" id="lr-variants-' + cssEscapeId(locusName) + '" style="display:none"></div>';
    h += '</div>';
  }

  // (4) FSSG changelog — per-locus history entries from FSSG's own
  // Change log sheet. Shown as a collapsible list so the user can see
  // "this locus was revised in v6.1 because …" without clutter.
  const clEntries = getFssgChangelog(locusName);
  if (clEntries.length > 0) {
    h += '<details class="lr-changelog">';
    h += '<summary class="lr-changelog-summary">📋 FSSG history <span class="lr-changelog-count">(' + clEntries.length + ' entr' + (clEntries.length===1?'y':'ies') + ')</span></summary>';
    h += '<div class="lr-changelog-body">';
    clEntries.forEach(e => {
      h += '<div class="lr-changelog-entry">';
      h += '<span class="lr-changelog-ver">v' + escHtml(String(e.version || '?')) + '</span>';
      if (e.date) h += '<span class="lr-changelog-date">' + escHtml(e.date) + '</span>';
      h += '<span class="lr-changelog-desc">' + escHtml(e.description || '') + '</span>';
      h += '</div>';
    });
    h += '</div></details>';
  }

  // ── Reference sequence accordion — only when we have sequence data ─
  // Data comes from public/loci-reference/data/reference-sequences.json
  // (see tools/loci-reference/extract-fssg-full.js). The accordion is
  // collapsed by default so it doesn't crowd the card; when expanded it
  // shows a colored-base grid + optional flanking toggle that reveals
  // the ±100 bp primer-binding context.
  if (refData) {
    const idSafe      = cssEscapeId(locusName);
    const sourceLabel = refData.source === 'fssg_v6.1' ? 'FSSG v6.1 (2024)'
                      : refData.source === 'lab_master' ? 'Lab master'
                      : 'Reference';
    // Refresh the coord line to use the new nested coord structure
    // when present (v3.0); fall back to the shimmed v1.0 values.
    const ng38 = refData.coordinates && refData.coordinates.grch38 && refData.coordinates.grch38.isfgMinimumRange;
    const coordLineV3 = ng38
      ? ng38.chr + ':' + ng38.start + '-' + ng38.end + ' (GRCh38) · ' + (refData.isfgLength || '?') + ' bp ISFG minimum range'
      : null;
    const hasFlanking = !!(refData.flankingLeft || refData.flankingRight);
    const coordLine = coordLineV3
      || ((refData.chr && refData.grch38 && refData.grch38.repeatStart)
        ? refData.chr + ':' + refData.grch38.repeatStart + '-' + refData.grch38.repeatEnd + ' (GRCh38) · ' + refData.isfgLength + ' bp repeat region'
        : (refData.isfgLength ? refData.isfgLength + ' bp repeat region' : ''));

    h += '<details class="lr-refseq" id="lr-refseq-' + idSafe + '" data-showing="repeat">';
    h += '<summary class="lr-refseq-summary">🧬 Reference sequence <span class="lr-refseq-source">· ' + escHtml(sourceLabel) + '</span></summary>';
    h += '<div class="lr-refseq-body">';
    h += '<div class="lr-refseq-toolbar">';
    if (hasFlanking) {
      h += '<button class="hb lr-refseq-toggle-btn" onclick="toggleRefSeqFlanking(\'' + escHtml(locusName) + '\')">Show ±100 bp flanking</button>';
    }
    if (coordLine) h += '<span class="lr-refseq-coords">' + escHtml(coordLine) + '</span>';
    h += '</div>';
    // Bracketing is now surfaced in the dedicated card above the accordion
    // (see the Bracketing card block), so we no longer repeat it here.
    h += '<div class="lr-refseq-grid-container">';
    const repeatStructure = computeRepeatStructure(refData, x);
    if (repeatStructure) {
      h += '<div class="lr-refseq-structure-note">Motif boxes derived from FSSG <b>' +
        (repeatStructure.source === 'strNaming_v1_2' ? 'STRNaming v1.2' :
         repeatStructure.source === 'historical_bracket' ? 'historical bracketing' :
         'locus repeat motif') + '</b></div>';
    }
    h += renderRefSequenceGrid(refData, { showFlanking: false, repeatStructure });
    h += '</div>';
    if (refData.incomplete) {
      h += '<div class="lr-refseq-warning">⚠ Sequence is incomplete in the source — flanking split may be approximate. Do not cite length-critical measurements from this record.</div>';
    }
    h += '</div></details>';
  }

  // Per-allele expected stutter (v468) — only for the GlobalFiler loci the model covers.
  h += renderPerAlleleStutterPanel(locusName);

  h += '<div style="margin-top:12px;text-align:right"><button class="hb" onclick="closeLocusDetail()" style="padding:6px 14px">◀ Back to Loci Reference</button></div>';

  const root = document.getElementById('locus-detail-root');
  if (root) root.innerHTML = h;
  const modal = document.getElementById('locus-detail-modal');
  modal.classList.add('show');
  function onKey(e) { if (e.key === 'Escape') { closeLocusDetail(); document.removeEventListener('keydown', onKey); } }
  function onClick(e) { if (e.target === modal) { closeLocusDetail(); modal.removeEventListener('click', onClick); } }
  document.addEventListener('keydown', onKey);
  modal.addEventListener('click', onClick);
}
function closeLocusDetail() {
  document.getElementById('locus-detail-modal').classList.remove('show');
}

// Colour-coded mini-badges for the structured flags[] on each locus.
function _flagBadge(flag) {
  const map = {
    // Red — warn / troubleshoot
    primer_binding_mutation: { label: '⚠ PBS mutation',        color: '#ef4444', title: 'Primer Binding Site mutations can cause allele dropout' },
    high_mutation:           { label: '⚠ High mutation',        color: '#ef4444', title: 'Above-average germline mutation rate' },
    high_stutter:            { label: '⚠ High stutter',         color: '#ef4444', title: 'Stutter above typical threshold' },
    tri_allelic:             { label: '⚠ Tri-allelic patterns', color: '#ef4444', title: 'Tri-allelic patterns observed; interpret with care' },
    // Amber — microvariants / structural quirks
    microvariant_x1:         { label: 'x.1 microvariant',       color: '#eab308', title: 'x.1 microvariant alleles reported' },
    microvariant_x2:         { label: 'x.2 microvariant',       color: '#eab308', title: 'x.2 microvariant alleles reported' },
    microvariant_x3:         { label: 'x.3 microvariant',       color: '#eab308', title: 'x.3 microvariant alleles reported' },
    compound_stutter:        { label: 'Compound stutter',       color: '#f59e0b', title: 'Compound repeat produces additional stutter peaks' },
    dinucleotide_region:     { label: 'Dinucleotide region',    color: '#f59e0b', title: 'Contains dinucleotide repeat regions' },
    mobility_modified:       { label: 'Mobility-modified',      color: '#f59e0b', title: 'Kit uses mobility-modified primers for this locus' },
    // Green — beneficial properties
    degraded_dna:            { label: '✓ Degraded DNA friendly',color: '#22c55e', title: 'Performs well on degraded DNA samples' },
    low_stutter:             { label: '✓ Low stutter',          color: '#22c55e', title: 'Low stutter profile' },
    // Slate — descriptive
    highly_polymorphic:      { label: 'Highly polymorphic',     color: '#3b82f6', title: 'Many alleles observed in populations' },
    least_polymorphic:       { label: 'Least polymorphic',      color: '#64748b', title: 'Fewer alleles than most markers' },
    less_polymorphic:        { label: 'Less polymorphic',       color: '#64748b', title: 'Below-average allele diversity' },
    tri:                     { label: 'TRI repeat',             color: '#a855f7', title: '3-bp (trinucleotide) repeat unit' },
    penta:                   { label: 'PENTA repeat',           color: '#a855f7', title: '5-bp (pentanucleotide) repeat unit' },
    hexa:                    { label: 'HEXA repeat',            color: '#a855f7', title: '6-bp (hexanucleotide) repeat unit' },
    complex_repeat:          { label: 'Complex repeat',         color: '#64748b', title: 'Complex repeat structure' },
    compound_repeat:         { label: 'Compound repeat',        color: '#64748b', title: 'Compound repeat structure' },
    largest_amplicon:        { label: 'Largest amplicon',       color: '#64748b', title: 'Longest PCR product in the panel' }
  };
  const m = map[flag] || { label: flag, color: '#64748b', title: flag };
  return '<span title="' + escHtml(m.title) + '" style="display:inline-block;background:' + m.color + '20;color:' + m.color + ';padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;border:1px solid ' + m.color + '44;white-space:nowrap">' + escHtml(m.label) + '</span>';
}

// Printer view — opens a new window with a compact training-handout style
// table, then triggers print. Popup-blocker-aware.
function printKitReference() {
  const loci = STR_DATA.loci || [];
  const w = window.open('', '_blank');
  if (!w) { toast('Popup blocked', 'error'); return; }
  let h = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>STR Loci Reference — Training Handout</title>';
  h += '<style>body{font-family:Arial,sans-serif;font-size:11px;max-width:1000px;margin:15px auto;color:#222}';
  h += 'h1{font-size:15px;text-align:center;margin:0 0 4px}h2{font-size:12px;margin:12px 0 6px;border-bottom:1px solid #999;padding-bottom:2px}';
  h += 'table{width:100%;border-collapse:collapse;margin:6px 0}th,td{padding:3px 5px;border:1px solid #bbb;font-size:10px;text-align:left}';
  h += 'th{background:#eee;font-weight:700}.mono{font-family:monospace}';
  h += '.c13{background:#dbeafe}.c20{background:#d1fae5}.cess{background:#ede9fe}';
  h += '@media print{body{margin:0}}</style></head><body>';
  h += '<h1>Forensic STR Loci Reference — Training Handout</h1>';
  h += '<div style="text-align:center;font-size:9px;color:#666;margin-bottom:8px">BIOLABOS Studios · Generated ' + new Date().toLocaleString('en-GB') + ' · Source: ' + escHtml(STR_DATA.source || '') + '</div>';

  // Summary per kit
  h += '<h2>Kit Summary</h2><table><thead><tr><th>Kit</th><th>Loci Count</th><th>Autosomal</th><th>Sex/Y</th></tr></thead><tbody>';
  Object.entries(STR_DATA.kits || {}).forEach(([name, kit]) => {
    const list = Object.keys(kit.loci || {});
    const auto = list.filter(n => LOCUS_MAP[n]?.t === 'autosomal').length;
    const sex  = list.filter(n => LOCUS_MAP[n]?.t === 'sex').length;
    h += '<tr><td><b>' + escHtml(name) + '</b></td><td>' + list.length + '</td><td>' + auto + '</td><td>' + sex + '</td></tr>';
  });
  h += '</tbody></table>';

  // Full locus table
  h += '<h2>All Loci</h2><table><thead><tr><th>Locus</th><th>Chr</th><th>Cat</th><th>Repeat</th><th>Range</th><th>Stutter</th><th>Mut</th><th>GF</th><th>INV</th><th>PPF</th><th>C13</th><th>C20</th><th>ESS</th></tr></thead><tbody>';
  loci.forEach(x => {
    h += '<tr><td class="mono" style="font-weight:700">' + escHtml(x.n) + '</td>';
    h += '<td>' + escHtml(x.chr) + '</td><td>' + escHtml(x.cat) + '</td>';
    h += '<td class="mono">' + escHtml(x.rm) + '</td><td>' + escHtml(x.ar) + (x.microvariant ? ' ◇' : '') + '</td>';
    h += '<td>' + (x.st !== null ? x.st + '%' : '—') + '</td>';
    h += '<td>' + (x.mr !== null ? x.mr : '—') + '</td>';
    ['GlobalFiler', 'Investigator 26plex QS', 'PowerPlex Fusion 6C'].forEach(k => {
      const dye = STR_KITS[k]?.loci[x.n];
      h += '<td style="text-align:center">' + (dye ? dye[0].toUpperCase() : '—') + '</td>';
    });
    h += '<td class="' + (x.c13  ? 'c13'  : '') + '" style="text-align:center">' + (x.c13  ? '✓' : '') + '</td>';
    h += '<td class="' + (x.c20  ? 'c20'  : '') + '" style="text-align:center">' + (x.c20  ? '✓' : '') + '</td>';
    h += '<td class="' + (x.c20e ? 'cess' : '') + '" style="text-align:center">' + (x.c20e ? '✓' : '') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  h += '<div style="margin-top:10px;font-size:9px;color:#666"><b>Legend:</b> ◇ = microvariant alleles known · GF=GlobalFiler, INV=Investigator 26plex QS, PPF=PowerPlex Fusion 6C · Cell letter = dye channel</div>';
  h += '</body></html>';
  w.document.write(h); w.document.close();
  setTimeout(() => w.print(), 500);
}

// ── New-name aliases ──────────────────────────────────────────
// The feature is now "Loci Reference" everywhere in the UI. Function
// names stayed showKitReference etc. so any cached HTML from older
// cache versions (which had onclick="showKitReference()") still works.
// New code should prefer the showLociReference name.
const showLociReference  = showKitReference;
const closeLociReference = closeKitReference;
